<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra Mastery: Squares, Roots & Absolute Values</title>
    
    <!-- MathJax Configuration and Script -->
    <script>
      MathJax = {
        tex: { inlineMath: [['\\(', '\\)']] },
        chtml: { scale: 1.1 } // Makes the math slightly larger for readability
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; margin: 0; padding: 20px; background-color: #f0f2f5; color: #333; }
        h1 { text-align: center; color: #1a2a6c; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        
        .controls-container { text-align: center; padding: 20px; margin-bottom: 30px; background-color: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        button { padding: 12px 28px; font-size: 1.05em; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 5px 10px; transition: 0.2s; }
        #generateBtn { background-color: #3498db; }
        #showSolutionsBtn { background-color: #27ae60; }
        #showSolutionsBtn:disabled { background-color: #7f8c8d; opacity: 1; cursor: default; }
        .problem-count { font-size: 0.95em; color: #555; margin-top: 8px; }
        
        .problem-list { list-style-type: none; padding-left: 0; max-width: 850px; margin: 0 auto; }
        .problem-card { margin-bottom: 30px; padding: 25px; border-radius: 12px; background-color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 8px solid #ddd; }
        
        .problem-header { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .problem-number { font-weight: bold; font-size: 1.3em; color: #95a5a6; }
        .problem-expression { font-size: 1.5em; color: #2c3e50; }
        .problem-tag { font-size: 0.7em; background: #ecf0f1; color: #7f8c8d; padding: 2px 10px; border-radius: 20px; vertical-align: middle; }
        
        .answer-box { display: flex; flex-direction: column; background: #fdfdfd; padding: 15px; border: 1px solid #eee; border-radius: 8px; }
        .user-input { padding: 10px; font-size: 1.2em; border: 2px solid #ced4da; border-radius: 6px; width: 220px; margin-left: 10px; text-align: center; }
        .input-hint { font-size: 0.85em; color: #888; margin-top: 5px; margin-left: 30px; }
        
        .solution-area { display: none; margin-top: 20px; padding: 20px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; }
        .algebra-line { display: block; background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 4px; margin: 8px 0; color: #2c3e50; }
        
        .correct-input { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; }
        .incorrect-input { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .report-header { text-align: center; background: white; border: 3px solid #27ae60; padding: 20px; margin-bottom: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        @media print { .controls-container { display: none; } .solution-area { display: block !important; } }
    </style>
</head>
<body>
    <h1>Algebra: Solving for \\( x \\)</h1>
    <p class="subtitle">Radicals, Square Powers, Absolute Values, and Rational Fractions.</p>
    
    <div class="controls-container">
        <button id="generateBtn">Generate New Problem Set</button>
        <button id="showSolutionsBtn">Submit & Generate Report</button>
        <div class="problem-count" id="problemCount"></div>
    </div>
    
    <div id="problemContainer" class="problem-list"></div>

    <script>
        const TOTAL_PROBLEMS = 20;
        const container = document.getElementById('problemContainer');
        const generateBtn = document.getElementById('generateBtn');
        const showBtn = document.getElementById('showSolutionsBtn');
        const problemCountEl = document.getElementById('problemCount');
        let currentProblems = [];

        function getRandom(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
        
        // Shuffle array in place (Fisher-Yates)
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Build a balanced type list
        function buildTypeList(count) {
            const types = ['radical', 'absolute', 'quadratic', 'rational', 'two_step_sqrt', 'abs_quad'];
            let list = [];
            const minPerType = Math.floor(count / types.length);
            const remainder = count - (minPerType * types.length);
            for (const t of types) {
                for (let i = 0; i < minPerType; i++) list.push(t);
            }
            for (let i = 0; i < remainder; i++) {
                list.push(types[getRandom(0, types.length - 1)]);
            }
            return shuffle(list);
        }

        function generateProblem(id, type) {
            let prob = { id, type, lhs: "", rhs: "", steps: [], correctAnswers: [], hint: "" };
            switch(type) {
                case 'radical': {
                    let a = getRandom(2, 30);
                    let b = getRandom(2, 12);
                    let ans = (b * b) + a;
                    prob.lhs = `\\sqrt{x - ${a}}`;
                    prob.rhs = `${b}`;
                    prob.correctAnswers = [ans.toString()];
                    prob.steps.push({m: "Square both sides to remove the radical:", l: `\\( x - ${a} = ${b}^2 = ${b*b} \\)`});
                    prob.steps.push({m: `Add ${a} to both sides:`, l: `\\( x = ${b * b} + ${a} = ${ans} \\)`});
                    break;
                }
                case 'absolute': {
                    let a = getRandom(3, 30);
                    let b = getRandom(3, 20);
                    let ans1 = b - a;
                    let ans2 = -b - a;
                    prob.lhs = `|x + ${a}|`;
                    prob.rhs = `${b}`;
                    prob.correctAnswers = [ans1.toString(), ans2.toString()];
                    prob.hint = "Enter two numbers separated by a comma.";
                    prob.steps.push({m: "Split into two linear equations:", l: `\\( x + ${a} = ${b} \\quad \\text{OR} \\quad x + ${a} = -${b} \\)`});
                    prob.steps.push({m: `Subtract ${a} from both:`, l: `\\( x = ${ans1}, \\quad x = ${ans2} \\)`});
                    break;
                }
                case 'quadratic': {
                    let a = getRandom(2, 7);
                    let x = getRandom(2, 9);
                    let b = a * (x * x);
                    prob.lhs = `${a}x^2`;
                    prob.rhs = `${b}`;
                    prob.correctAnswers = [x.toString(), (-x).toString()];
                    prob.hint = "Enter two numbers (positive and negative).";
                    prob.steps.push({m: `Divide both sides by ${a}:`, l: `\\( x^2 = ${b / a} \\)`});
                    prob.steps.push({m: "Take the square root (±):", l: `\\( x = \\pm\\sqrt{${b / a}} \\)`});
                    prob.steps.push({m: "Result:", l: `\\( x = ${x}, \\quad x = -${x} \\)`});
                    break;
                }
                case 'rational': {
                    let x = getRandom(2, 12);
                    let b = getRandom(2, 9);
                    let a = x * b;
                    prob.lhs = `\\frac{${a}}{x}`;
                    prob.rhs = `${b}`;
                    prob.correctAnswers = [x.toString()];
                    prob.steps.push({m: "Multiply both sides by \\( x \\):", l: `\\( ${a} = ${b}x \\)`});
                    prob.steps.push({m: `Divide by ${b}:`, l: `\\( x = ${x} \\)`});
                    break;
                }
                case 'two_step_sqrt': {
                    let a = getRandom(1, 15);
                    let rootVal = getRandom(2, 8);
                    let b = a + rootVal;
                    let ans = rootVal * rootVal;
                    prob.lhs = `\\sqrt{x} + ${a}`;
                    prob.rhs = `${b}`;
                    prob.correctAnswers = [ans.toString()];
                    prob.steps.push({m: `Isolate the radical by subtracting ${a}:`, l: `\\( \\sqrt{x} = ${rootVal} \\)`});
                    prob.steps.push({m: "Square both sides:", l: `\\( x = ${rootVal}^2 = ${ans} \\)`});
                    break;
                }
                case 'abs_quad': {
                    let xVal = getRandom(3, 9);
                    let perfectSq = xVal * xVal;       
                    let c = getRandom(1, perfectSq - 1);
                    let d = perfectSq - c;
                    
                    // Ensure c - d < 0 so the second case has no real solution
                    if (c - d >= 0) { c = getRandom(1, Math.floor(perfectSq / 2) - 1); d = perfectSq - c; }
                    
                    prob.lhs = `|x^2 - ${c}|`;
                    prob.rhs = `${d}`;
                    prob.correctAnswers = [xVal.toString(), (-xVal).toString()];
                    prob.hint = "Solve for x. (Hint: One case may have no real solution).";
                    prob.steps.push({m: "Split into two cases:", l: `\\( x^2 - ${c} = ${d} \\quad \\text{OR} \\quad x^2 - ${c} = -${d} \\)`});
                    prob.steps.push({m: "Solve Case 1:", l: `\\( x^2 = ${c + d} \\implies x = ${xVal}, \\quad x = -${xVal} \\)`});
                    prob.steps.push({m: "Solve Case 2:", l: `\\( x^2 = ${c - d} \\implies \\text{No real solution} \\)`});
                    break;
                }
            }
            return prob;
        }

        function getTimestamp() {
            const now = new Date();
            const yy = String(now.getFullYear()).slice(-2);
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const hh = String(now.getHours()).padStart(2, '0');
            const mi = String(now.getMinutes()).padStart(2, '0');
            return `${yy}${mm}${dd}_${hh}${mi}`;
        }

        const typeLabels = {
            radical: 'Radical', absolute: 'Absolute Value', quadratic: 'Quadratic',
            rational: 'Rational', two_step_sqrt: 'Two-Step Radical', abs_quad: 'Abs + Quadratic'
        };

        function render() {
            container.innerHTML = ''; currentProblems = [];
            showBtn.disabled = false; showBtn.style.backgroundColor = '#27ae60'; showBtn.textContent = "Submit & Generate Report";
            const typeList = buildTypeList(TOTAL_PROBLEMS);
            problemCountEl.textContent = `${TOTAL_PROBLEMS} problems — all types included. No shortcuts!`;
            
            for (let i = 1; i <= TOTAL_PROBLEMS; i++) {
                const p = generateProblem(i, typeList[i - 1]);
                currentProblems.push(p);
                const div = document.createElement('div');
                div.className = 'problem-card';
                div.innerHTML = `
                    <div class="problem-header">
                        <span class="problem-number">#${i}</span>
                        <div class="problem-expression">\\( ${p.lhs} = ${p.rhs} \\)</div>
                        <span class="problem-tag">${typeLabels[p.type]}</span>
                    </div>
                    <div class="answer-box">
                        <div style="display:flex; align-items:center;"><label>\\( x = \\)</label><input type="text" class="user-input" id="input-${i}" placeholder="?"></div>
                        <div class="input-hint">${p.hint || "Enter the numeric answer."}</div>
                    </div>
                    <div class="solution-area" id="sol-${i}">
                        <strong>Step-by-Step Solution:</strong>
                        ${p.steps.map(s => `<div class="step-row">${s.m}<span class="algebra-line">${s.l}</span></div>`).join('')}
                        <div style="color:#2980b9; font-weight:bold; margin-top:10px;">Final Answer(s): \\( x = ${p.correctAnswers.join(', ')} \\)</div>
                    </div>`;
                container.appendChild(div);
            }

            // Tell MathJax to re-render the newly injected math symbols
            if (typeof MathJax !== 'undefined') {
                MathJax.typesetPromise([container]).catch((err) => console.log(err.message));
            }
        }

        function check() {
            let score = 0;
            currentProblems.forEach(p => {
                const input = document.getElementById(`input-${p.id}`);
                const userVal = input.value.replace(/\s+/g, '');
                let userArr = userVal.split(',').map(s => s.trim()).filter(s => s !== "");
                
                let isCorrect = (userArr.length === p.correctAnswers.length) && 
                                 userArr.every(val => p.correctAnswers.includes(val));
                input.classList.add(isCorrect ? 'correct-input' : 'incorrect-input');
                document.getElementById(`sol-${p.id}`).style.display = 'block';
                if (isCorrect) score++;
            });
            const timeStr = new Date().toLocaleString();
            const pct = Math.round((score / TOTAL_PROBLEMS) * 100);
            
            showBtn.disabled = true;
            showBtn.innerHTML = `Score: ${score}/${TOTAL_PROBLEMS} (${pct}%)<br><small>${timeStr}</small>`;
            
            // Auto-download report 
            const clone = document.documentElement.cloneNode(true);
            clone.querySelectorAll('script, .controls-container').forEach(el => el.remove());
            const body = clone.querySelector('body');
            const header = document.createElement('div');
            header.className = 'report-header';
            header.innerHTML = `<h1>Algebra Mastery Report</h1><h2>Score: ${score} / ${TOTAL_PROBLEMS} (${pct}%)</h2><p>Date: ${timeStr}</p>`;
            body.insertBefore(header, body.firstChild);
            
            const inputs = clone.querySelectorAll('.user-input');
            document.querySelectorAll('.user-input').forEach((original, idx) => {
                const span = document.createElement('span');
                span.textContent = original.value || "Empty";
                span.className = original.className + " static-answer";
                span.style.padding = "5px 15px";
                span.style.border = "1px solid #ccc";
                inputs[idx].parentNode.replaceChild(span, inputs[idx]);
            });
            clone.querySelectorAll('.solution-area').forEach(s => s.style.display = 'block');
            
            const blob = new Blob(['<!DOCTYPE html>\n' + clone.outerHTML], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Algebra_Mastery_Report_${getTimestamp()}.html`;
            a.click();
        }

        generateBtn.addEventListener('click', render);
        showBtn.addEventListener('click', check);
        
        // Initial render
        render();
    </script>
</body>
</html>
