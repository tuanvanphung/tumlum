<body>

<script>
const root=document.getElementById('examRoot');
let questions=[];
let timerInterval=null,timerSeconds=0,timerRunning=false;
const TIMER_DURATION=120*60,TOTAL_ITEMS=42;
const r=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const rDec=(a,b,p=1)=>parseFloat((Math.random()*(b-a)+a).toFixed(p));
const gcd=(a,b)=>b?gcd(b,a%b):Math.abs(a);
const simplify=(n,d)=>{if(!d)return'undefined';if(!n)return'0';const s=(n<0)!==(d<0)?-1:1;n=Math.abs(n);d=Math.abs(d);const c=gcd(n,d);return(d/c===1)?`${s*(n/c)}`:`${s*(n/c)}/${d/c}`;};
const rNZ=(a,b)=>{let v=0;while(!v)v=r(a,b);return v;};
const pick=arr=>arr[r(0,arr.length-1)];
function getStamp(){const d=new Date();return[d.getFullYear(),(d.getMonth()+1+'').padStart(2,'0'),(d.getDate()+'').padStart(2,'0'),'_',(d.getHours()+'').padStart(2,'0'),(d.getMinutes()+'').padStart(2,'0'),(d.getSeconds()+'').padStart(2,'0')].join('');}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=r(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}
function toggleTimer(){
    const btn=document.getElementById('timerBtn'),disp=document.getElementById('timerDisplay');
    if(!timerRunning){timerRunning=true;timerSeconds=TIMER_DURATION;btn.textContent='Timer: ON';btn.style.background='#dc2626';updateTimerDisplay();
        timerInterval=setInterval(()=>{timerSeconds--;updateTimerDisplay();if(timerSeconds<=0){clearInterval(timerInterval);timerRunning=false;btn.textContent='Timer: OFF';btn.style.background='#7c3aed';disp.textContent="TIME'S UP";disp.className='timer-display critical';gradeTest();}},1000);
    }else{clearInterval(timerInterval);timerRunning=false;btn.textContent='Timer: OFF';btn.style.background='#7c3aed';disp.textContent='--:--';disp.className='timer-display';}
}
function updateTimerDisplay(){const disp=document.getElementById('timerDisplay'),m=Math.floor(timerSeconds/60),s=timerSeconds%60;disp.textContent=`${(m+'').padStart(2,'0')}:${(s+'').padStart(2,'0')}`;disp.className=timerSeconds<=300?'timer-display critical':timerSeconds<=900?'timer-display warning':'timer-display';}
function normalizeAnswer(raw){let s=raw.trim().toLowerCase().replace(/\s+/g,' ');if(/^-?\d+\.0+$/.test(s))s=s.replace(/\.0+$/,'');return s;}
function fracToDecimal(s){const p=s.split('/');if(p.length===2){const n=parseFloat(p[0]),d=parseFloat(p[1]);if(!isNaN(n)&&!isNaN(d)&&d)return n/d;}return NaN;}
function mixedToDecimal(s){const m=s.match(/^(-?\d+)\s+(\d+)\/(\d+)$/);if(m){const w=parseInt(m[1]),n=parseInt(m[2]),d=parseInt(m[3]);if(d)return w+(w<0?-1:1)*(n/d);}return NaN;}
function answersMatch(uR,cR){
    const u=normalizeAnswer(uR),c=normalizeAnswer(cR);
    if(u===c)return true;
    if(!isNaN(parseFloat(u))&&!isNaN(parseFloat(c))&&Math.abs(parseFloat(u)-parseFloat(c))<0.005)return true;
    let uV=fracToDecimal(u),cV=fracToDecimal(c);if(isNaN(uV))uV=mixedToDecimal(u);if(isNaN(cV))cV=mixedToDecimal(c);if(isNaN(uV))uV=parseFloat(u);if(isNaN(cV))cV=parseFloat(c);
    if(!isNaN(uV)&&!isNaN(cV)&&Math.abs(uV-cV)<0.005)return true;
    const ni=s=>s.replace(/\s*(<=|>=|<|>|=)\s*/g,'$1');if(ni(u)===ni(c))return true;
    return false;
}
const templates=[
    {cat:'Number Sense & Operations / Algebraic Reasoning',title:'Laws of Exponents: Quotient Rule',key:'exp_quot',bm:'MA.7.NSO.1.1'},
    {cat:'Number Sense & Operations / Algebraic Reasoning',title:'Laws of Exponents: Power to Power',key:'exp_power',bm:'MA.7.NSO.1.1'},
    {cat:'Number Sense & Operations / Algebraic Reasoning',title:'Exponents: Negative Powers',key:'exp_neg',bm:'MA.7.NSO.1.1'},
    {cat:'Number Sense & Operations / Algebraic Reasoning',title:'Repeating Decimals to Fractions',key:'repeat_2',bm:'MA.7.NSO.1.2'},
    {cat:'Number Sense & Operations / Algebraic Reasoning',title:'Complex Order of Operations',key:'complex_pemdas',bm:'MA.7.NSO.2.1'},
    {cat:'Number Sense & Operations / Algebraic Reasoning',title:'Absolute Value Expressions',key:'abs_expr',bm:'MA.7.NSO.2.1'},
    {cat:'Number Sense & Operations / Algebraic Reasoning',title:'Rational Operations (Mixed Numbers)',key:'rat_mixed',bm:'MA.7.NSO.2.2'},
    {cat:'Number Sense & Operations / Algebraic Reasoning',title:'Multiplying Negative Decimals',key:'neg_dec_mul',bm:'MA.7.NSO.2.2'},
    {cat:'Number Sense & Operations / Algebraic Reasoning',title:'Dividing Fractions by Decimals',key:'frac_dec_div',bm:'MA.7.NSO.2.2'},
    {cat:'Number Sense & Operations / Algebraic Reasoning',title:'Rational Numbers in Real-World',key:'rat_rw',bm:'MA.7.NSO.2.3'},
    {cat:'Number Sense & Operations / Algebraic Reasoning',title:'Equivalent Linear Expressions',key:'equiv_expr',bm:'MA.7.AR.1.1/1.2'},
    {cat:'Number Sense & Operations / Algebraic Reasoning',title:'2-Step Inequality: Sign Flip',key:'ineq_flip',bm:'MA.7.AR.2.1'},
    {cat:'Number Sense & Operations / Algebraic Reasoning',title:'Writing Inequalities from Context',key:'ineq_context',bm:'MA.7.AR.2.1'},
    {cat:'Number Sense & Operations / Algebraic Reasoning',title:'2-Step Eq: Rational Coeff',key:'eq_rat_coeff',bm:'MA.7.AR.2.2'},
    {cat:'Number Sense & Operations / Algebraic Reasoning',title:'Equations: Negative Distribution',key:'eq_neg_dist',bm:'MA.7.AR.2.2'},
    {cat:'Number Sense & Operations / Algebraic Reasoning',title:'Equations: Combining Like Terms',key:'eq_var_one',bm:'MA.7.AR.2.2'},
    {cat:'Proportional Reasoning & Relationships',title:'Multi-Step Percent: Discount + Tax',key:'disc_tax',bm:'MA.7.AR.3.1'},
    {cat:'Proportional Reasoning & Relationships',title:'Percent Error',key:'perc_error',bm:'MA.7.AR.3.1'},
    {cat:'Proportional Reasoning & Relationships',title:'Markup and Wholesale',key:'markup_comm',bm:'MA.7.AR.3.1'},
    {cat:'Proportional Reasoning & Relationships',title:'Simple Interest (Months)',key:'interest_months',bm:'MA.7.AR.3.1'},
    {cat:'Proportional Reasoning & Relationships',title:'Unit Conversions Across Systems',key:'unit_convert',bm:'MA.7.AR.3.3'},
    {cat:'Proportional Reasoning & Relationships',title:'Proportional Relationships',key:'prop_rel',bm:'MA.7.AR.4.1'},
    {cat:'Proportional Reasoning & Relationships',title:'Constant of Proportionality',key:'cop_dec',bm:'MA.7.AR.4.2'},
    {cat:'Proportional Reasoning & Relationships',title:'Proportional Graphs',key:'graph_logic',bm:'MA.7.AR.4.3'},
    {cat:'Proportional Reasoning & Relationships',title:'Translate Proportional Representations',key:'prop_translate',bm:'MA.7.AR.4.4'},
    {cat:'Proportional Reasoning & Relationships',title:'Complex Unit Rates',key:'complex_unit',bm:'MA.7.AR.4.5'},
    {cat:'Proportional Reasoning & Relationships',title:'Scale Drawings: Area Change',key:'scale_area',bm:'MA.7.AR.4.5/GR.1.5'},
    {cat:'Geometric Reasoning',title:'Area of Trapezoids/Parallelograms/Rhombi',key:'area_trap',bm:'MA.7.GR.1.1'},
    {cat:'Geometric Reasoning',title:'Area of Composite Figures',key:'area_composite',bm:'MA.7.GR.1.2'},
    {cat:'Geometric Reasoning',title:'Circumference of Circles',key:'circ_pi',bm:'MA.7.GR.1.3'},
    {cat:'Geometric Reasoning',title:'Area of Circles',key:'area_circ',bm:'MA.7.GR.1.4'},
    {cat:'Geometric Reasoning',title:'Radius from Circumference',key:'circ_back',bm:'MA.7.GR.1.3'},
    {cat:'Geometric Reasoning',title:'Surface Area of Cylinders',key:'sa_cylinder',bm:'MA.7.GR.2.1/2.2'},
    {cat:'Geometric Reasoning',title:'Volume of Cylinders',key:'vol_cylinder',bm:'MA.7.GR.2.3'},
    {cat:'Data Analysis & Probability',title:'Mean Absolute Deviation',key:'mad_dec',bm:'MA.7.DP.1.1'},
    {cat:'Data Analysis & Probability',title:'Comparing Two Data Sets',key:'compare_data',bm:'MA.7.DP.1.2'},
    {cat:'Data Analysis & Probability',title:'Interquartile Range (IQR)',key:'box_iqr',bm:'MA.7.DP.1.3'},
    {cat:'Data Analysis & Probability',title:'Inference from Sample',key:'infer',bm:'MA.7.DP.1.4'},
    {cat:'Data Analysis & Probability',title:'Biased vs Random Sampling',key:'bias_logic',bm:'MA.7.DP.1.5'},
    {cat:'Data Analysis & Probability',title:'Sample Space Counting',key:'sample_perm',bm:'MA.7.DP.2.1'},
    {cat:'Data Analysis & Probability',title:'Theoretical Probability',key:'theo_prob',bm:'MA.7.DP.2.2'},
    {cat:'Data Analysis & Probability',title:'Compound Probability',key:'theo_comp',bm:'MA.7.DP.2.3'},
    {cat:'Data Analysis & Probability',title:'Experimental vs Theoretical Probability',key:'exp_large',bm:'MA.7.DP.2.4'}
];
function buildQuestion(t){
let p={...t,q:'',a:'',v:'',s:[],ds:[],cm:[],h:'Enter your answer.'};
switch(t.key){
case 'exp_quot':{
    let bases=['y','m','n','a','b','k'];
    let base=pick(bases),p1=r(8,20),p2=r(2,p1-2);
    p.q=`Simplify: ${base}<sup>${p1}</sup> / ${base}<sup>${p2}</sup>`;
    p.a=`${base}^${p1-p2}`;p.h="Like y^n";
    p.s=[`${base}^(${p1}−${p2}) = ${base}^${p1-p2}`];
    p.ds=[{title:'Quotient rule',detail:'Same base: subtract exponents.',math:`${base}^(${p1}−${p2}) = ${base}^${p1-p2}`}];
    p.cm=['Adding instead of subtracting','Subtracting in wrong order'];
    break;
}
case 'exp_power':{
    let bases=['x','a','m','p','w'];
    let base=pick(bases),b2=r(2,9),e2=r(2,5);
    p.q=`Simplify: (${base}<sup>${b2}</sup>)<sup>${e2}</sup>`;
    p.a=`${base}^${b2*e2}`;p.h="Like x^n";
    p.s=[`${base}^(${b2}×${e2}) = ${base}^${b2*e2}`];
    p.ds=[{title:'Power rule: multiply exponents',detail:'',math:`(${base}^${b2})^${e2} = ${base}^${b2*e2}`}];
    p.cm=['Adding exponents instead of multiplying'];
    break;
}
case 'exp_neg':{
    let bp=r(2,10),ex=r(2,4),pw=Math.pow(bp,ex);
    p.q=`Evaluate: ${bp}<sup>−${ex}</sup>`;
    p.a=`1/${pw}`;p.h="Fraction like 1/n";
    p.s=[`1/${bp}^${ex} = 1/${pw}`];
    p.ds=[{title:'Negative exponent = reciprocal',detail:`${bp}^${ex} = ${pw}`,math:`1/${pw}`}];
    p.cm=['Making answer negative instead of a fraction'];
    break;
}
case 'repeat_2':{
    let rep=r(10,95);while(rep%11===0||rep%10===0)rep=r(10,95);
    let g2=gcd(rep,99);
    p.q=`Convert 0.${(rep+'').padStart(2,'0')}${(rep+'').padStart(2,'0')}... (repeating) to a fraction.`;
    p.a=simplify(rep,99);p.h="Simplified fraction";
    p.s=[`99x = ${rep} → ${rep}/99 = ${p.a}`];
    p.ds=[{title:'Let x = decimal',detail:'Multiply by 100 (2 repeating digits), subtract, solve.',math:`99x = ${rep} → x = ${p.a}`}];
    p.cm=['Multiplying by 10 instead of 100','Forgetting to simplify'];
    break;
}
case 'complex_pemdas':{
    // Many variants: (a)^n ± b(c), |a| + b^n, etc.
    let variant=r(1,4);
    if(variant===1){
        let base=rNZ(-6,-2),exp_=r(2,3),m1=r(2,8),m2=r(2,8);
        let pw=Math.pow(base,exp_),prod=m1*m2,res=pw-prod;
        let eL=exp_===2?'²':'³';
        p.q=`Evaluate: (${base})${eL} − ${m1}(${m2})`;p.a=res.toString();
        p.s=[`(${base})${eL}=${pw}, ${m1}×${m2}=${prod}, ${pw}−${prod}=${res}`];
        p.ds=[{title:'Exponent first',detail:`(${base})${eL}=${pw}`},{title:'Multiply',detail:`${m1}×${m2}=${prod}`},{title:'Subtract',detail:'',math:`${pw}−${prod}=${res}`}];
    }else if(variant===2){
        let a=rNZ(-9,-1),b=r(2,6),exp_=r(2,3);
        let pw=Math.pow(b,exp_),res=Math.abs(a)+pw;
        p.q=`Evaluate: |${a}| + ${b}${exp_===2?'²':'³'}`;p.a=res.toString();
        p.s=[`|${a}|=${Math.abs(a)}, ${b}${exp_===2?'²':'³'}=${pw}, ${Math.abs(a)}+${pw}=${res}`];
        p.ds=[{title:'Absolute value',detail:`|${a}|=${Math.abs(a)}`},{title:'Exponent',detail:`${b}^${exp_}=${pw}`},{title:'Add',detail:'',math:`${Math.abs(a)}+${pw}=${res}`}];
    }else if(variant===3){
        let a=r(2,6),b=r(2,5),c=rNZ(-8,-2);
        let res=a*a+b*c;
        p.q=`Evaluate: ${a}² + ${b}(${c})`;p.a=res.toString();
        p.s=[`${a}²=${a*a}, ${b}×${c}=${b*c}, ${a*a}+${b*c}=${res}`];
        p.ds=[{title:'Exponent',detail:`${a}²=${a*a}`},{title:'Multiply',detail:`${b}(${c})=${b*c}`},{title:'Add',detail:'',math:`${a*a}+(${b*c})=${res}`}];
    }else{
        let a=rNZ(-5,-2),b=r(3,7),c=r(2,4);
        let res=a*b-Math.pow(c,2);
        p.q=`Evaluate: (${a})(${b}) − ${c}²`;p.a=res.toString();
        p.s=[`(${a})(${b})=${a*b}, ${c}²=${c*c}, ${a*b}−${c*c}=${res}`];
        p.ds=[{title:'Multiply',detail:`(${a})(${b})=${a*b}`},{title:'Exponent',detail:`${c}²=${c*c}`},{title:'Subtract',detail:'',math:`${a*b}−${c*c}=${res}`}];
    }
    p.h="Integer value";
    p.cm=['Wrong order of operations','Sign errors with negative bases'];
    break;
}
case 'abs_expr':{
    let variant=r(1,3);
    if(variant===1){
        let a=rNZ(-25,-3),b=rNZ(-20,-2),res=Math.abs(a)-Math.abs(b);

    if(timerRunning){clearInterval(timerInterval);timerRunning=false;document.getElementById('timerBtn').textContent='Timer: OFF';document.getElementById('timerBtn').style.background='#7c3aed';document.getElementById('timerDisplay').textContent='--:--';document.getElementById('timerDisplay').className='timer-display';}
    let allBuilt=templates.map(t=>buildQuestion(t));
    let grouped={};catNamesList.forEach(c=>grouped[c]=[]);
    allBuilt.forEach(q=>{if(grouped[q.cat])grouped[q.cat].push(q);});
    catNamesList.forEach(c=>shuffle(grouped[c]));
    let shuffledCats=shuffle([...catNamesList]);
    let itemNum=1;
    shuffledCats.forEach(cat=>{
        if(!grouped[cat].length)return;
        const hdr=document.createElement('div');hdr.className='category-header';hdr.setAttribute('role','heading');hdr.setAttribute('aria-level','2');hdr.innerText=cat;root.appendChild(hdr);
        grouped[cat].forEach(p=>{
            p.displayNum=itemNum++;catMap[p.cat].total++;questions.push(p);
            const card=document.createElement('div');card.className='card';card.id=`card-${p.displayNum}`;card.setAttribute('role','region');
            card.innerHTML=`<div class="q-meta"><span class="q-num">Item #${p.displayNum}</span><span class="q-tag">${p.title}</span><span style="font-size:.7em;color:#94a3b8;font-weight:600">${p.bm||''}</span></div><div style="font-size:1.3em;font-weight:700">${p.q}</div>${p.v?`<div class="viz-box">${p.v}</div>`:''}<div class="ans-container"><label for="ans-${p.displayNum}">Answer:</label><input type="text" id="ans-${p.displayNum}" placeholder="Your Answer..."><span style="color:#64748b;font-style:italic;font-weight:600">${p.h}</span></div><div id="sol-container-${p.displayNum}"></div>`;
            root.appendChild(card);
        });
    });
    document.getElementById('liveScore').innerText='';
}
function gradeTest(){
    let score=0;catNamesList.forEach(c=>catMap[c].correct=0);
    questions.forEach(p=>{
        const input=document.getElementById(`ans-${p.displayNum}`),card=document.getElementById(`card-${p.displayNum}`),solC=document.getElementById(`sol-container-${p.displayNum}`);
        const ua=input.value.trim(),ok=answersMatch(ua,p.a);
        input.classList.remove('correct-ans','wrong-ans');input.classList.add(ok?'correct-ans':'wrong-ans');
        card.classList.remove('card-correct','card-wrong');card.classList.add(ok?'card-correct':'card-wrong');
        if(ok){score++;catMap[p.cat].correct++;}
        solC.innerHTML=buildSolutionHTML(p,ok,ua);
    });
    const pct=Math.round((score/TOTAL_ITEMS)*100);
    document.getElementById('liveScore').innerText=`TOTAL: ${score}/${TOTAL_ITEMS} (${pct}%)`;
    if(timerRunning){clearInterval(timerInterval);timerRunning=false;document.getElementById('timerBtn').textContent='Timer: OFF';document.getElementById('timerBtn').style.background='#7c3aed';}
    window.scrollTo({top:0,behavior:'smooth'});
    let catHTML='<div class="cat-breakdown">';
    catNamesList.forEach(cat=>{const c=catMap[cat],cp=c.total>0?Math.round((c.correct/c.total)*100):0;let color=cp>=70?'#059669':cp>=50?'#f59e0b':'#dc2626';catHTML+=`<div class="cat-score-card"><h3>${cat}</h3><div class="score-big" style="color:${color}">${c.correct}/${c.total}</div><div style="font-weight:700;color:#64748b">${cp}%</div><div class="score-bar"><div class="score-fill" style="width:${cp}%;background:${color}"></div></div></div>`;});
    catHTML+='</div>';
    setTimeout(()=>{
        const clone=document.documentElement.cloneNode(true);clone.querySelectorAll('.nav-tools,script').forEach(e=>e.remove());
        const header=document.createElement('div');header.className='report-box';
        header.innerHTML=`<h1 style="margin:0 0 10px">FAST 7th Grade Report</h1><h2 style="margin:0 0 20px">Overall: ${pct}%</h2><p style="font-size:1.2em;font-weight:700">Correct: ${score}/${TOTAL_ITEMS}</p>${catHTML}<p style="color:#64748b;margin-top:20px">${new Date().toLocaleString()}</p>`;
        clone.querySelector('.container').prepend(header);
        const blob=new Blob(['<!DOCTYPE html>'+clone.outerHTML],{type:'text/html'});
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`FAST_Grade7_${getStamp()}.html`;a.click();URL.revokeObjectURL(a.href);
    },1000);
}
window.onload=initTest;
</script>
</body>
