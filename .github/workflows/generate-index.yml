name: Generate and Deploy Index HTML

on:
  push:
    branches:
      - main
    paths:    
      - '**.html'
      - '!index.html'
      - '.github/workflows/generate-index.yml'
  workflow_dispatch: 

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate index.html
        run: |
          import os
          import html

          # --- Configuration ---
          INDEX_TITLE = "TRYHARDZ"
          EXCLUDE_FILES = ['index.html'] 
          EXCLUDE_DIRS = ['.git', '.github', 'node_modules', 'venv', 'env']
          
          # Playful scholastic emojis to prepend to folders
          ACADEMIC_EMOJIS = ["🎒", "📐", "📝", "🔬", "📚", "🎨", "🧠", "🧩"]

          # Color palettes used sequentially for section cards (vibrant primary accents)
          COLOR_PALETTES = [
              {"primary": "#3b82f6", "hover": "#1d4ed8", "bg": "#eff6ff"},
              {"primary": "#10b981", "hover": "#047857", "bg": "#ecfdf5"},
              {"primary": "#8b5cf6", "hover": "#6d28d9", "bg": "#f5f3ff"},
              {"primary": "#f97316", "hover": "#c2410c", "bg": "#fff7ed"},
              {"primary": "#ec4899", "hover": "#be185d", "bg": "#fdf2f8"},
              {"primary": "#14b8a6", "hover": "#0f766e", "bg": "#f0fdfa"},
              {"primary": "#f59e0b", "hover": "#b45309", "bg": "#fffbeb"},
              {"primary": "#ef4444", "hover": "#b91c1c", "bg": "#fef2f2"}
          ]
          # --- End Configuration ---

          exclude_files_lower = [f.lower() for f in EXCLUDE_FILES]

          def to_friendly_name(name_string):
              base = os.path.splitext(name_string)[0]
              parts = []
              current_part = ""
              for char_idx, char in enumerate(base):
                  if char.isupper() and current_part and not current_part[-1].isspace() and not (char_idx > 0 and base[char_idx-1].isupper()):
                      parts.append(current_part)
                      current_part = char
                  elif char in ['_', '-']:
                      if current_part: parts.append(current_part)
                      current_part = ""
                  else:
                      current_part += char
              if current_part: parts.append(current_part)
              friendly = ' '.join(word.capitalize() for word in parts if word.strip()).strip()
              return friendly if friendly else name_string

          sections = {}
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in EXCLUDE_DIRS and not d.startswith('.')]
              rel_path = os.path.relpath(root, '.')
              if rel_path == '.':
                  section_key = "PRIORITY"
              else:
                  path_parts = rel_path.split(os.sep)
                  section_key = " - ".join(to_friendly_name(part) for part in path_parts)

              section_files = []
              for f in files:
                  if f.endswith('.html') and f.lower() not in exclude_files_lower:
                      full_path = os.path.join(rel_path, f) if rel_path != '.' else f
                      url_path = full_path.replace('\\', '/')
                      section_files.append((f, url_path))
              
              if section_files:
                  section_files.sort(key=lambda x: (not 'math' in x[0].lower(), x[0].lower()))
                  sections[section_key] = section_files

          if not sections:
              index_content = f"<!DOCTYPE html><html><head><title>{html.escape(INDEX_TITLE)}</title></head><body><h1>No HTML files found.</h1></body></html>"
          else:
              sorted_section_keys = sorted([k for k in sections.keys() if k != "PRIORITY"])
              if "PRIORITY" in sections:
                  sorted_section_keys.insert(0, "PRIORITY")

              cards_html = ""
              for idx, sec_name in enumerate(sorted_section_keys):
                  palette = COLOR_PALETTES[idx % len(COLOR_PALETTES)]
                  emoji = ACADEMIC_EMOJIS[idx % len(ACADEMIC_EMOJIS)]
                  
                  list_items = ""
                  for filename, filepath in sections[sec_name]:
                      friendly_name = to_friendly_name(filename)
                      badge_html = ""
                      fn_lower = filename.lower()
                      is_math = 'math' in fn_lower
                      
                      if is_math:
                          badge_html = '<span class="badge badge-math">Math</span>'
                          li_class = "file-item math-item"
                      else:
                          li_class = "file-item"
                          if fn_lower.startswith("reading"):
                              badge_html = '<span class="badge badge-reading">Reading</span>'
                      
                      list_items += f"""                        <li class="{li_class}">
                              <a href="{html.escape(filepath)}">
                                  <span class="file-name">{html.escape(friendly_name)}</span>
                                  {badge_html}
                              </a>
                          </li>\n"""
                  
                  # Render Section Card with active Emoji
                  cards_html += f"""        <details class="section-card" style="--accent-color: {palette['primary']}; --accent-hover: {palette['hover']}; --accent-bg: {palette['bg']};">
                      <summary class="section-title">
                          <span class="folder-emoji">{emoji}</span>
                          {html.escape(sec_name)}
                      </summary>
                      <ul class="file-list">
              {list_items}        </ul>
                  </details>\n"""

              index_content = f"""<!DOCTYPE html>
              <html lang="en">
              <head>
                  <meta charset="UTF-8">
                  <meta name="viewport" content="width=device-width, initial-scale=1.0">
                  <title>{html.escape(INDEX_TITLE)}</title>
                  <style>
                      @import url('https://fonts.googleapis.com/css2?family=Syne+Mono&display=swap');
                      @import url('https://fonts.googleapis.com/css2?family=Geo&display=swap');
                      
                      body {{
                          font-family: 'Syne Mono', monospace, sans-serif;
                          margin: 0;
                          padding: 50px 20px;
                          background-color: #fafaf9;
                          /* Classic notebook paper: 24px grid + pink left margin exactly 2 squares in */
                          background-image: 
                              linear-gradient(90deg, transparent 46px, #fca5a5 46px, #fca5a5 48px, transparent 48px),
                              linear-gradient(#e2e8f0 1px, transparent 1px),
                              linear-gradient(90deg, #e2e8f0 1px, transparent 1px);
                          background-size: 100% 100%, 24px 24px, 24px 24px;
                          color: #1e293b;
                      }}
                      .container {{ max-width: 800px; margin: auto; position: relative; }}
                      
                      /* Doodle Style Header */
                      header {{ text-align: center; margin-bottom: 50px; }}
                      h1 {{ 
                          color: #0f172a; 
                          font-size: 3.5rem; 
                          margin: 0; 
                          font-weight: 800;
                          display: inline-block;
                          background-color: #fdf08a; /* Yellow highlighter */
                          padding: 5px 25px;
                          border: 4px solid #1e293b; /* Sharpie marker */
                          box-shadow: 6px 6px 0px #1e293b;
                          transform: rotate(-2deg);
                          transition: transform 0.2s ease;
                      }}
                      h1:hover {{ transform: rotate(1deg) scale(1.05); }}
                      
                      .grid {{ display: flex; flex-direction: column; gap: 30px; }}
                      
                      /* Sketchbook flat 3D cards */
                      .section-card {{
                          background: white;
                          border-radius: 12px;
                          border: 3px solid #1e293b;
                          box-shadow: 6px 6px 0px var(--accent-color);
                          transition: transform 0.15s ease, box-shadow 0.15s ease;
                      }}
                      .section-card:hover {{
                          transform: translate(-2px, -2px);
                          box-shadow: 8px 8px 0px var(--accent-color);
                      }}
                      .section-title {{
                          color: #0f172a;
                          font-size: 1.35rem;
                          font-weight: 700;
                          margin: 0;
                          padding: 20px 24px;
                          cursor: pointer;
                          user-select: none;
                          display: flex;
                          align-items: center;
                          gap: 12px;
                          list-style: none;
                      }}
                      .section-title::-webkit-details-marker {{ display: none; }}
                      
                      .folder-emoji {{
                          font-size: 1.5rem;
                          flex-shrink: 0;
                      }}
                      
                      /* Plus/Cross math toggle symbol */
                      .section-title::after {{
                          content: "+";
                          margin-left: auto;
                          font-size: 1.8rem;
                          font-family: monospace;
                          font-weight: bold;
                          color: #1e293b;
                          transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                          flex-shrink: 0;
                          line-height: 1;
                      }}
                      .section-card[open] .section-title::after {{ transform: rotate(45deg); color: #ef4444; }}
                      
                      /* Animate Dropdown Open */
                      .section-card[open] .file-list {{
                          animation: slideDown 0.25s ease-out forwards;
                      }}
                      @keyframes slideDown {{
                          0% {{ opacity: 0; transform: translateY(-10px); }}
                          100% {{ opacity: 1; transform: translateY(0); }}
                      }}
                      
                      /* Dashed tear-out divider style */
                      .file-list {{
                          list-style: none;
                          padding: 0 24px 24px 24px;
                          margin: 0;
                          display: flex;
                          flex-direction: column;
                          gap: 12px;
                          border-top: 3px dashed #cbd5e1;
                          padding-top: 20px;
                      }}
                      .file-item a {{
                          text-decoration: none;
                          color: #334155;
                          font-weight: 500;
                          font-size: 0.95rem;
                          padding: 10px 14px;
                          border-radius: 8px;
                          background-color: #f1f5f9;
                          border: 2px solid #e2e8f0;
                          border-left: 6px solid #cbd5e1;
                          display: flex;
                          align-items: center;
                          justify-content: space-between;
                          transition: all 0.15s ease;
                      }}
                      /* Messy desk hover effect */
                      .file-item a:hover {{
                          background-color: var(--accent-bg);
                          color: var(--accent-hover);
                          border-color: #1e293b;
                          border-left-color: var(--accent-color);
                          transform: scale(1.02) rotate(-1deg);
                          position: relative;
                          z-index: 10;
                          box-shadow: 3px 3px 0px rgba(30, 41, 59, 0.15);
                      }}
                      
                      /* Highlighted green math blocks */
                      .file-item.math-item a {{
                          background-color: #ecfdf5;
                          border-color: #a7f3d0;
                          border-left: 6px solid #10b981;
                          color: #065f46;
                      }}
                      .file-item.math-item a:hover {{
                          background-color: #d1fae5;
                          color: #047857;
                          border-color: #1e293b;
                          border-left-color: #059669;
                          transform: scale(1.02) rotate(1deg); /* Alternate tilt for math */
                      }}
                      .file-name {{ overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 75%; }}
                      
                      /* Sticker Style Tags */
                      .badge {{
                          font-family: 'Geo', sans-serif;
                          font-size: 0.9rem;
                          font-weight: 700;
                          padding: 4px 10px;
                          border-radius: 4px;
                          text-transform: uppercase;
                          letter-spacing: 0.05em;
                          display: inline-flex;
                          align-items: center;
                          justify-content: center;
                          line-height: 1;
                          border: 2px solid #1e293b;
                          box-shadow: 2px 2px 0px #1e293b;
                          background-color: white; /* Forces it to look like an overlay sticker */
                      }}
                      .badge-math {{ color: #059669; transform: rotate(-3deg); }}
                      .badge-reading {{ color: #4f46e5; transform: rotate(3deg); }}
                  </style>
              </head>
              <body>
                  <div class="container">
                      <header><h1>{html.escape(INDEX_TITLE)}</h1></header>
                      <div class="grid">{cards_html}</div>
                  </div>
              </body>
              </html>
              """

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(index_content)
          print("index.html generated successfully.")
        shell: python

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
