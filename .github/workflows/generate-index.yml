name: Generate and Deploy Index HTML

on:
  push:
    branches:
      - main
    paths:    
      - '**.html'
      - '!index.html'
      - '.github/workflows/generate-index.yml'
  workflow_dispatch: 

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate index.html
        run: |
          import os
          import html

          # --- Configuration ---
          INDEX_TITLE = "School Materials"
          EXCLUDE_FILES = ['index.html'] 
          EXCLUDE_DIRS = ['.git', '.github', 'node_modules', 'venv', 'env']
          
          COLOR_PALETTES = [
              {"primary": "#3b82f6", "hover": "#1d4ed8", "bg": "#eff6ff"},
              {"primary": "#10b981", "hover": "#047857", "bg": "#ecfdf5"},
              {"primary": "#8b5cf6", "hover": "#6d28d9", "bg": "#f5f3ff"},
              {"primary": "#f97316", "hover": "#c2410c", "bg": "#fff7ed"},
              {"primary": "#ec4899", "hover": "#be185d", "bg": "#fdf2f8"},
              {"primary": "#14b8a6", "hover": "#0f766e", "bg": "#f0fdfa"},
              {"primary": "#f59e0b", "hover": "#b45309", "bg": "#fffbeb"},
              {"primary": "#ef4444", "hover": "#b91c1c", "bg": "#fef2f2"}
          ]
          # --- End Configuration ---

          exclude_files_lower = [f.lower() for f in EXCLUDE_FILES]

          def to_friendly_name(name_string):
              base = os.path.splitext(name_string)[0]
              parts = []
              current_part = ""
              for char_idx, char in enumerate(base):
                  if char.isupper() and current_part and not current_part[-1].isspace() and not (char_idx > 0 and base[char_idx-1].isupper()):
                      parts.append(current_part)
                      current_part = char
                  elif char in ['_', '-']:
                      if current_part: parts.append(current_part)
                      current_part = ""
                  else:
                      current_part += char
              if current_part: parts.append(current_part)
              friendly = ' '.join(word.capitalize() for word in parts if word.strip()).strip()
              return friendly if friendly else name_string

          sections = {}
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in EXCLUDE_DIRS and not d.startswith('.')]
              rel_path = os.path.relpath(root, '.')
              if rel_path == '.':
                  section_key = "PRIORITY"
              else:
                  path_parts = rel_path.split(os.sep)
                  section_key = " - ".join(to_friendly_name(part) for part in path_parts)

              section_files = []
              for f in files:
                  if f.endswith('.html') and f.lower() not in exclude_files_lower:
                      full_path = os.path.join(rel_path, f) if rel_path != '.' else f
                      url_path = full_path.replace('\\', '/')
                      section_files.append((f, url_path))
              
              if section_files:
                  section_files.sort(key=lambda x: (not 'math' in x[0].lower(), x[0].lower()))
                  sections[section_key] = section_files

          if not sections:
              index_content = f"<!DOCTYPE html><html><head><title>{html.escape(INDEX_TITLE)}</title></head><body><h1>No HTML files found.</h1></body></html>"
          else:
              sorted_section_keys = sorted([k for k in sections.keys() if k != "PRIORITY"])
              if "PRIORITY" in sections:
                  sorted_section_keys.insert(0, "PRIORITY")

              cards_html = ""
              for idx, sec_name in enumerate(sorted_section_keys):
                  palette = COLOR_PALETTES[idx % len(COLOR_PALETTES)]
                  list_items = ""
                  for filename, filepath in sections[sec_name]:
                      friendly_name = to_friendly_name(filename)
                      badge_html = ""
                      fn_lower = filename.lower()
                      is_math = 'math' in fn_lower
                      
                      if is_math:
                          badge_html = '<span class="badge badge-math">Math</span>'
                          li_class = "file-item math-item"
                      else:
                          li_class = "file-item"
                          if fn_lower.startswith("reading"):
                              badge_html = '<span class="badge badge-reading">Reading</span>'
                      
                      list_items += f"""                        <li class="{li_class}">
                              <a href="{html.escape(filepath)}">
                                  <span class="file-name">{html.escape(friendly_name)}</span>
                                  {badge_html}
                              </a>
                          </li>\n"""
                  
                  cards_html += f"""        <details class="section-card" style="--accent-color: {palette['primary']}; --accent-hover: {palette['hover']}; --accent-bg: {palette['bg']};">
                      <summary class="section-title">{html.escape(sec_name)}</summary>
                      <ul class="file-list">
              {list_items}        </ul>
                  </details>\n"""

              index_content = f"""<!DOCTYPE html>
              <html lang="en">
              <head>
                  <meta charset="UTF-8">
                  <meta name="viewport" content="width=device-width, initial-scale=1.0">
                  <title>{html.escape(INDEX_TITLE)}</title>
                  <style>
                      @import url('https://fonts.googleapis.com/css2?family=Flamenco:wght@300;400&display=swap');
                      @import url('https://fonts.googleapis.com/css2?family=Sixtyfour&display=swap');
                      
                      body {{
                          font-family: 'Flamenco', serif;
                          margin: 0;
                          padding: 40px 20px;
                          background-color: #f8fafc;
                          color: #1e293b;
                      }}
                      .container {{ max-width: 800px; margin: auto; }}
                      header {{ text-align: center; margin-bottom: 40px; }}
                      h1 {{ color: #0f172a; font-size: 2.5rem; margin: 0; font-weight: 800; }}
                      .grid {{ display: flex; flex-direction: column; gap: 24px; }}
                      .section-card {{
                          background: white;
                          border-radius: 16px;
                          box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
                          border-top: 6px solid var(--accent-color);
                          transition: transform 0.2s ease, box-shadow 0.2s ease;
                      }}
                      .section-card:hover {{
                          transform: translateY(-4px);
                          box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
                      }}
                      .section-title {{
                          color: #0f172a;
                          font-size: 1.35rem;
                          font-weight: 700;
                          margin: 0;
                          padding: 20px 24px;
                          cursor: pointer;
                          user-select: none;
                          display: flex;
                          align-items: center;
                          gap: 12px;
                          list-style: none;
                      }}
                      .section-title::-webkit-details-marker {{ display: none; }}
                      .section-title::before {{
                          content: "";
                          display: inline-block;
                          width: 8px;
                          height: 8px;
                          border-radius: 50%;
                          background-color: var(--accent-color);
                          flex-shrink: 0;
                      }}
                      .section-title::after {{
                          content: "▼";
                          margin-left: auto;
                          font-size: 0.8rem;
                          color: #64748b;
                          transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
                          flex-shrink: 0;
                      }}
                      .section-card[open] .section-title::after {{ transform: rotate(180deg); }}
                      .file-list {{
                          list-style: none;
                          padding: 0 24px 24px 24px;
                          margin: 0;
                          display: flex;
                          flex-direction: column;
                          gap: 10px;
                          border-top: 1px solid #e2e8f0;
                          padding-top: 20px;
                      }}
                      .file-item a {{
                          text-decoration: none;
                          color: #334155;
                          font-weight: 500;
                          font-size: 0.95rem;
                          padding: 10px 12px;
                          border-radius: 8px;
                          background-color: #f1f5f9;
                          border-left: 4px solid #e2e8f0;
                          display: flex;
                          align-items: center;
                          justify-content: space-between;
                          transition: background-color 0.2s ease, color 0.2s ease, border-left-color 0.2s ease;
                      }}
                      .file-item a:hover {{
                          background-color: var(--accent-bg);
                          color: var(--accent-hover);
                          border-left-color: var(--accent-color);
                      }}
                      .file-item.math-item a {{
                          background-color: #ecfdf5;
                          border-left: 4px solid #10b981;
                          color: #065f46;
                      }}
                      .file-item.math-item a:hover {{
                          background-color: #d1fae5;
                          color: #047857;
                          border-left-color: #059669;
                      }}
                      .file-name {{ overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80%; }}
                      
                      .badge {{
                          font-family: 'Sixtyfour', monospace, sans-serif;
                          font-size: 0.55rem;
                          font-weight: 400;
                          padding: 4px 8px;
                          border-radius: 4px;
                          text-transform: uppercase;
                          letter-spacing: 0.025em;
                          display: inline-flex;
                          align-items: center;
                          justify-content: center;
                          line-height: 1;
                      }}
                      .badge-math {{ background-color: #d1fae5; color: #065f46; }}
                      .badge-reading {{ background-color: #e0e7ff; color: #3730a3; }}
                  </style>
              </head>
              <body>
                  <div class="container">
                      <header><h1>{html.escape(INDEX_TITLE)}</h1></header>
                      <div class="grid">{cards_html}</div>
                  </div>
              </body>
              </html>
              """

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(index_content)
          print("index.html generated successfully.")
        shell: python

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
