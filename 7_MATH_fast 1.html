<script>
const root=document.getElementById('examRoot');
let questions=[];
const TOTAL_ITEMS=34;
const r=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const rDec=(a,b,p=1)=>parseFloat((Math.random()*(b-a)+a).toFixed(p));
const gcd=(a,b)=>b?gcd(b,a%b):Math.abs(a);
const simplify=(n,d)=>{if(!d)return'undefined';if(!n)return'0';const s=(n<0)!==(d<0)?-1:1;n=Math.abs(n);d=Math.abs(d);const c=gcd(n,d);return(d/c===1)?`${s*(n/c)}`:`${s*(n/c)}/${d/c}`;};
const rNZ=(a,b)=>{let v=0;while(!v)v=r(a,b);return v;};
const pick=arr=>arr[r(0,arr.length-1)];
function getStamp(){const d=new Date();return[d.getFullYear(),(d.getMonth()+1+'').padStart(2,'0'),(d.getDate()+'').padStart(2,'0'),'_',(d.getHours()+'').padStart(2,'0'),(d.getMinutes()+'').padStart(2,'0'),(d.getSeconds()+'').padStart(2,'0')].join('');}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=r(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}
function updateProgress(){
    let filled=0;
    questions.forEach(p=>{const inp=document.getElementById(`ans-${p.displayNum}`);if(inp&&inp.value.trim())filled++;});
    const pct=Math.round((filled/TOTAL_ITEMS)*100);
    document.getElementById('progressFill').style.width=pct+'%';
    document.getElementById('progressText').textContent=`${filled} / ${TOTAL_ITEMS}`;
}
function normalizeAnswer(raw){let s=raw.trim().toLowerCase().replace(/\s+/g,' ');if(/^-?\d+\.0+$/.test(s))s=s.replace(/\.0+$/,'');return s;}
function fracToDecimal(s){const p=s.split('/');if(p.length===2){const n=parseFloat(p[0]),d=parseFloat(p[1]);if(!isNaN(n)&&!isNaN(d)&&d)return n/d;}return NaN;}
function mixedToDecimal(s){const m=s.match(/^(-?\d+)\s+(\d+)\/(\d+)$/);if(m){const w=parseInt(m[1]),n=parseInt(m[2]),d=parseInt(m[3]);if(d)return w+(w<0?-1:1)*(n/d);}return NaN;}
function answersMatch(uR,cR){
    const u=normalizeAnswer(uR),c=normalizeAnswer(cR);
    if(u===c)return true;
    if(!isNaN(parseFloat(u))&&!isNaN(parseFloat(c))&&Math.abs(parseFloat(u)-parseFloat(c))<0.015)return true;
    let uV=fracToDecimal(u),cV=fracToDecimal(c);if(isNaN(uV))uV=mixedToDecimal(u);if(isNaN(cV))cV=mixedToDecimal(c);if(isNaN(uV))uV=parseFloat(u);if(isNaN(cV))cV=parseFloat(c);
    if(!isNaN(uV)&&!isNaN(cV)&&Math.abs(uV-cV)<0.015)return true;
    const ni=s=>s.replace(/\s*(<=|>=|<|>|=)\s*/g,'$1');if(ni(u)===ni(c))return true;
    const stripSp=s=>s.replace(/\s/g,'');if(stripSp(u)===stripSp(c))return true;
    return false;
}

{cat:'Number Sense & Operations / Algebraic Reasoning',title:'Laws of Exponents',key:'nso11',bm:'MA.7.NSO.1.1'},
{cat:'Number Sense & Operations / Algebraic Reasoning',title:'Equivalent Forms of Rationals',key:'nso12',bm:'MA.7.NSO.1.2'},
{cat:'Number Sense & Operations / Algebraic Reasoning',title:'Order of Operations',key:'nso21',bm:'MA.7.NSO.2.1'},
{cat:'Number Sense & Operations / Algebraic Reasoning',title:'Four Operations with Rationals',key:'nso22',bm:'MA.7.NSO.2.2'},

{cat:'Number Sense & Operations / Algebraic Reasoning',title:'Two-Step Equations',key:'ar22',bm:'MA.7.AR.2.2'},
{cat:'Proportional Reasoning & Relationships',title:'Multi-Step Percent Problems',key:'ar31',bm:'MA.7.AR.3.1'},
{cat:'Proportional Reasoning & Relationships',title:'Proportions in Real World',key:'ar32',bm:'MA.7.AR.3.2'},

{cat:'Proportional Reasoning & Relationships',title:'Constant of Proportionality',key:'ar42',bm:'MA.7.AR.4.2'},

{cat:'Proportional Reasoning & Relationships',title:'Translate Proportional Representations',key:'ar44',bm:'MA.7.AR.4.4'},
{cat:'Proportional Reasoning & Relationships',title:'Solve Proportional Problems',key:'ar45',bm:'MA.7.AR.4.5'},
{cat:'Geometric Reasoning',title:'Area: Trapezoids, Parallelograms, Rhombi',key:'gr11',bm:'MA.7.GR.1.1'},
{cat:'Geometric Reasoning',title:'Area of Composite Figures',key:'gr12',bm:'MA.7.GR.1.2'},
{cat:'Geometric Reasoning',title:'Circumference of Circles',key:'gr13',bm:'MA.7.GR.1.3'},
{cat:'Geometric Reasoning',title:'Area of Circles',key:'gr14',bm:'MA.7.GR.1.4'},

{cat:'Geometric Reasoning',title:'Surface Area: Nets of Cylinders',key:'gr21',bm:'MA.7.GR.2.1'},
{cat:'Geometric Reasoning',title:'Surface Area of Cylinders (Applied)',key:'gr22',bm:'MA.7.GR.2.2'},
{cat:'Geometric Reasoning',title:'Volume of Cylinders',key:'gr23',bm:'MA.7.GR.2.3'},
{cat:'Data Analysis & Probability',title:'Measures of Center & Variation',key:'dp11',bm:'MA.7.DP.1.1'},
{cat:'Data Analysis & Probability',title:'Comparing Data Distributions',key:'dp12',bm:'MA.7.DP.1.2'},
{cat:'Data Analysis & Probability',title:'Interquartile Range (IQR)',key:'dp13',bm:'MA.7.DP.1.3'},
{cat:'Data Analysis & Probability',title:'Making Inferences from Samples',key:'dp14',bm:'MA.7.DP.1.4'},
{cat:'Data Analysis & Probability',title:'Random vs Biased Sampling',key:'dp15',bm:'MA.7.DP.1.5'},
{cat:'Data Analysis & Probability',title:'Sample Space & Counting',key:'dp21',bm:'MA.7.DP.2.1'},
{cat:'Data Analysis & Probability',title:'Theoretical Probability',key:'dp22',bm:'MA.7.DP.2.2'},
{cat:'Data Analysis & Probability',title:'Compound Probability',key:'dp23',bm:'MA.7.DP.2.3'},
{cat:'Data Analysis & Probability',title:'Experimental vs Theoretical',key:'dp24',bm:'MA.7.DP.2.4'},
];
function buildQuestion(t){
let p={...t,q:'',a:'',v:'',s:[],ds:[],h:'Enter your answer.'};
switch(t.key){
case 'nso11':{
    let variant=r(1,4);
    if(variant===1){let base=pick(['x','a','m','n']),p1=r(7,18),p2=r(2,p1-2);p.q=`Simplify using the Laws of Exponents.<br><br>${base}<sup>${p1}</sup> &divide; ${base}<sup>${p2}</sup>`;p.a=`${base}^${p1-p2}`;p.h=`Like ${base}^n`;p.ds=[{title:'Quotient Rule: subtract exponents',detail:`Same base → subtract.`,math:`${base}^(${p1}−${p2}) = ${base}^${p1-p2}`}];}
    else if(variant===2){let base=pick(['y','b','w','k']),e1=r(2,8),e2=r(2,5);p.q=`Simplify using the Laws of Exponents.<br><br>(${base}<sup>${e1}</sup>)<sup>${e2}</sup>`;p.a=`${base}^${e1*e2}`;p.h=`Like ${base}^n`;p.ds=[{title:'Power Rule: multiply exponents',detail:'',math:`(${base}^${e1})^${e2} = ${base}^${e1*e2}`}];}
    else if(variant===3){let base=r(2,9),ex=r(2,4),pw=Math.pow(base,ex);p.q=`Evaluate the expression.<br><br>${base}<sup>&minus;${ex}</sup>`;p.a=`1/${pw}`;p.h='Fraction like 1/n';p.ds=[{title:'Negative exponent → reciprocal',detail:`${base}^${ex} = ${pw}`,math:`${base}^(−${ex}) = 1/${pw}`}];}
    else{let base=pick(['a','x','p']),e1=r(2,6),e2=r(2,5);p.q=`Simplify using the Laws of Exponents.<br><br>${base}<sup>${e1}</sup> &middot; ${base}<sup>${e2}</sup>`;p.a=`${base}^${e1+e2}`;p.h=`Like ${base}^n`;p.ds=[{title:'Product Rule: add exponents',detail:'Same base → add.',math:`${base}^${e1} · ${base}^${e2} = ${base}^${e1+e2}`}];}
    p.s=[p.ds[0].math];
    break;
}
case 'nso12':{
    let variant=r(1,3);
    if(variant===1){let rep=r(10,95);while(rep%11===0||rep%10===0)rep=r(10,95);p.q=`Convert 0.${(rep+'').padStart(2,'0')}${(rep+'').padStart(2,'0')}... (repeating) to a fraction in simplest form.`;p.a=simplify(rep,99);p.ds=[{title:'Let x = the repeating decimal',detail:'Since 2 digits repeat, multiply both sides by 100.',math:`100x = ${rep}.${(rep+'').padStart(2,'0')}${(rep+'').padStart(2,'0')}...`},{title:'Subtract x from 100x',detail:'The repeating parts cancel.',math:`100x − x = ${rep}\n99x = ${rep}`},{title:'Solve for x and simplify',detail:'',math:`x = ${rep}/99 = ${simplify(rep,99)}`}];}
    else if(variant===2){let n=r(1,7),d=pick([8,5,4,20,25,40]);while(n>=d)n=r(1,d-1);let pct=parseFloat((n/d*100).toFixed(2));p.q=`Convert ${n}/${d} to a percent.`;p.a=pct+'%';p.h='Like 12.5%';p.ds=[{title:'Divide numerator by denominator',detail:'',math:`${n} ÷ ${d} = ${(n/d).toFixed(4).replace(/0+$/,'')}`},{title:'Multiply by 100',detail:'',math:`${(n/d).toFixed(4).replace(/0+$/,'')} × 100 = ${pct}%`}];}
    else{let pct=pick([12.5,37.5,62.5,87.5,33.33,66.67,16.67,83.33]);let fracs={12.5:'1/8',37.5:'3/8',62.5:'5/8',87.5:'7/8',33.33:'1/3',66.67:'2/3',16.67:'1/6',83.33:'5/6'};p.q=`Convert ${pct}% to a fraction in simplest form.`;p.a=fracs[pct];p.h='Simplified fraction';p.ds=[{title:'Write percent over 100',detail:'',math:`${pct}/100`},{title:'Simplify the fraction',detail:'',math:`= ${fracs[pct]}`}];}
    p.s=[p.ds[p.ds.length-1].math];
    break;

case 'nso21':{
    let a=rNZ(-6,-2),exp_=r(2,3),m1=r(2,8),m2=r(2,8);
    let pw=Math.pow(a,exp_),prod=m1*m2,res=pw-prod;
    let eL=exp_===2?'²':'³';
    p.q=`Evaluate the expression.<br><br>(${a})${eL} &minus; ${m1}(${m2})`;p.a=res.toString();p.h='Integer value';
    p.ds=[{title:'Exponent first',detail:`(${a})${eL} = ${pw}`},{title:'Multiply',detail:`${m1} × ${m2} = ${prod}`},{title:'Subtract',detail:'',math:`${pw} − ${prod} = ${res}`}];
    p.s=[`${pw} − ${prod} = ${res}`];
    break;
}
case 'nso22':{
    let variant=r(1,3);
    if(variant===1){
        let denoms=[3,4,5,6,8];let d1=pick(denoms),w1=rNZ(-5,-1),n1=r(1,d1-1),w2=r(1,6),n2=r(1,d1-1);
        let imp1=w1*d1-n1,imp2=w2*d1+n2,sN=imp1+imp2,sD=d1;
        let g_=gcd(Math.abs(sN),sD),sn_=sN/g_,sd_=sD/g_;
        let wh=Math.trunc(sn_/sd_),rm=Math.abs(sn_%sd_);
        if(rm===0)p.a=wh.toString();else if(wh===0)p.a=simplify(sn_,sd_);else p.a=`${wh} ${rm}/${sd_}`;
        p.q=`What is the value of the expression?<br><br>${w1} ${n1}/${d1} + ${w2} ${n2}/${d1}`;
        p.ds=[{title:'Convert to improper fractions',detail:'',math:`${imp1}/${d1} + ${imp2}/${d1}`},{title:'Add numerators (same denominator)',detail:'',math:`(${imp1} + ${imp2})/${d1} = ${sN}/${sD}`},{title:'Simplify / convert to mixed number',detail:'',math:`= ${p.a}`}];
    }else if(variant===2){
        let nd1=rDec(-5.5,-0.5),nd2=rDec(0.5,6.0),prod=(nd1*nd2).toFixed(2);
        p.q=`What is the product?<br><br>(${nd1}) &times; (${nd2})`;p.a=prod;
        p.ds=[{title:'Determine the sign',detail:'Negative × Positive = Negative'},{title:'Multiply the absolute values',detail:'',math:`${Math.abs(nd1)} × ${nd2} = ${Math.abs(parseFloat(prod))}`},{title:'Apply the negative sign',detail:'',math:`= ${prod}`}];
    }else{
        let fn=r(1,5),fd=pick([2,3,4,5,6,8]);while(fn>=fd)fn=r(1,fd-1);
        let decimals=[0.25,0.5,-0.5,0.2,-0.2,0.75,-0.75];let dec=pick(decimals),dA=Math.abs(dec),dN,dD;
        if(dA===0.25){dN=1;dD=4;}else if(dA===0.5){dN=1;dD=2;}else if(dA===0.2){dN=1;dD=5;}else if(dA===0.75){dN=3;dD=4;}else{dN=Math.round(dA*1000);dD=1000;}
        let rN=fn*dD,rD=fd*dN;if(dec<0)rN=-rN;

        const clone=document.documentElement.cloneNode(true);clone.querySelectorAll('.nav-tools,script').forEach(e=>e.remove());
        const header=document.createElement('div');header.className='report-box';
        header.innerHTML=`<h1 style="margin:0 0 10px">FAST Grade 7 — Report Card</h1><h2 style="margin:0 0 5px">${grade}</h2><p style="font-size:2.5em;font-weight:900;margin:10px 0">${pct}%</p><p style="font-size:1.2em;font-weight:700">Correct: ${score} / ${TOTAL_ITEMS}</p>${catHTML}<p style="color:#64748b;margin-top:20px">${new Date().toLocaleString()}</p>`;
        clone.querySelector('.container').prepend(header);
        const blob=new Blob(['<!DOCTYPE html>'+clone.outerHTML],{type:'text/html'});
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`FAST_Grade7_${getStamp()}.html`;a.click();URL.revokeObjectURL(a.href);
    },1000);
}
window.onload=initTest;
</script>
</body>
