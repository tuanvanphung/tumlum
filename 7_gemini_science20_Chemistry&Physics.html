        nav.appendChild(btn);
    });
    renderUnit(1);
}

function switchUnit(num) {
    document.querySelectorAll('.unit-btn').forEach((b, idx) => b.classList.toggle('active', idx + 1 === num));
    renderUnit(num);
    window.scrollTo(0, 0);
}

function renderUnit(uId) {
    // Offset uId because allData uses u:3 and u:4
    const actualU = uId + 2; 
    const data = allData.filter(item => item.u === actualU);
    const bank = document.getElementById('topic-bank');
    const list = document.getElementById('match-list');
    bank.innerHTML = ''; list.innerHTML = '';

    const placed = Object.values(userAnswers);
    const available = data.filter(i => !placed.includes(i.t)).map(i => i.t).sort(() => Math.random() - 0.5);

    available.forEach(txt => {
        const div = document.createElement('div');
        div.className = 'draggable-topic'; div.innerText = txt; div.draggable = true;
        div.ondragstart = (e) => e.dataTransfer.setData('text', txt);
        bank.appendChild(div);
    });

    data.forEach(item => {
        const card = document.createElement('div'); card.className = 'match-card';
        const drop = document.createElement('div'); drop.className = 'drop-zone'; drop.dataset.id = item.id;

        if (userAnswers[item.id]) {
            const pi = document.createElement('div'); pi.className = 'placed-item'; pi.innerText = userAnswers[item.id];
            pi.onclick = () => { delete userAnswers[item.id]; renderUnit(uId); };
            drop.appendChild(pi);
        }

        drop.ondragover = (e) => { e.preventDefault(); drop.classList.add('drag-over'); };
        drop.ondragleave = () => drop.classList.remove('drag-over');
        drop.ondrop = (e) => {
            e.preventDefault();
            const txt = e.dataTransfer.getData('text');
            for (let k in userAnswers) { if (userAnswers[k] === txt) delete userAnswers[k]; }
            userAnswers[item.id] = txt; renderUnit(uId);
        };

        const desc = document.createElement('div'); desc.className = 'description-box';
        let exHtml = item.ex.map(exStr => `<div>• ${exStr}</div>`).join('');
        desc.innerHTML = `${item.d} <div class="examples-list"><strong>5 Examples & Reasoning:</strong>${exHtml}</div>`;
        card.appendChild(drop); card.appendChild(desc); list.appendChild(card);
    });
}

function getTS() {
    const d = new Date();
    const f = (n) => n.toString().padStart(2, '0');
    return `${d.getFullYear().toString().slice(2)}${f(d.getMonth()+1)}${f(d.getDate())}_${f(d.getHours())}${f(d.getMinutes())}`;
}

document.getElementById('submit-btn').onclick = () => {
    const ts = getTS();
    const fname = window.location.pathname.split('/').pop().split('.')[0] || "Science_Part2";
    const reportName = `${fname}_${ts}.html`;
    
    let total = 0; let sections = '';
    for (let i = 3; i <= 4; i++) {
        const uData = allData.filter(x => x.u === i);
        let rows = ''; let uCorrect = 0;

        uData.forEach(item => {
            const ans = userAnswers[item.id] || "No Answer";
            const isCorrect = ans === item.t;
            if (isCorrect) { uCorrect++; total++; }
            const review = isCorrect ? "Result: Perfect Match." : (ans === "No Answer" ? "Result: Blank." : `Correction: You chose "${ans}", which describes: "${allData.find(x => x.t === ans)?.d || 'N/A'}"`);
            rows += `<tr style="background: ${isCorrect ? '#f0fff4' : '#fff5f5'}">
                <td style="padding:10px; border:1px solid #ddd; font-weight:bold;">${item.t}</td>
                <td style="padding:10px; border:1px solid #ddd;">${ans}</td>
                <td style="padding:10px; border:1px solid #ddd; text-align:center;">${isCorrect ? '✅' : '❌'}</td>
                <td style="padding:10px; border:1px solid #ddd; font-size:0.85em;">${item.d}</td>
                <td style="padding:10px; border:1px solid #ddd; font-size:0.8em; color:#555;">${review}</td></tr>`;
        });

        sections += `<div style="margin-top:30px;"><h2 style="background:#2c3e50; color:white; padding:10px;">${UNIT_NAMES[i-3]} (${uCorrect}/${uData.length})</h2>
            <table style="width:100%; border-collapse:collapse; margin-top:10px;">
                <thead style="background:#edf2f7;"><tr><th style="padding:10px; border:1px solid #ddd;">Fact</th><th style="padding:10px; border:1px solid #ddd;">Your Match</th><th style="padding:10px; border:1px solid #ddd;">Status</th><th style="padding:10px; border:1px solid #ddd;">Definition</th><th style="padding:10px; border:1px solid #ddd;">Analysis</th></tr></thead>
                <tbody>${rows}</tbody></table></div>`;
    }

    const html = `<html><head><title>Score Report ${ts}</title></head><body style="font-family:sans-serif; padding:30px; background:#fdfdfd;">
        <div style="max-width:1400px; margin: auto; background:white; padding:30px; border-radius:10px; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
            <h1>Science Mastery Score Report (Part 2)</h1><p style="font-size:1.4em;">Total Correct: ${total} / 40</p><p>Generated: ${new Date().toLocaleString()}</p>${sections}</div></body></html>`;

    const blob = new Blob([html], { type: 'text/html' });
    const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = reportName; link.click();
};
init();
</script>
