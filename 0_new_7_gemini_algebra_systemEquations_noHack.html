<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra Mastery: Systems of Equations</title>
    
    <!-- MathJax Configuration and Script -->
    <script>
      window.MathJax = {
        tex: { inlineMath: [['\\(', '\\)']] },
        chtml: { scale: 1.1 } 
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; margin: 0; padding: 20px; background-color: #f0f2f5; color: #333; }
        h1 { text-align: center; color: #1a2a6c; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        
        .controls-container { text-align: center; padding: 20px; margin-bottom: 30px; background-color: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        button { padding: 12px 28px; font-size: 1.05em; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 5px 10px; transition: 0.2s; }
        #generateBtn { background-color: #3498db; }
        #generateBtn:hover { background-color: #2980b9; }
        #showSolutionsBtn { background-color: #27ae60; }
        #showSolutionsBtn:hover:not(:disabled) { background-color: #219653; }
        #showSolutionsBtn:disabled { background-color: #7f8c8d; opacity: 1; cursor: default; }
        .problem-count { font-size: 1.05em; color: #444; margin-top: 8px; font-weight: 500; }
        
        .problem-list { list-style-type: none; padding-left: 0; max-width: 850px; margin: 0 auto; }
        .problem-card { margin-bottom: 30px; padding: 25px; border-radius: 12px; background-color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 8px solid #34495e; }
        
        .problem-header { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .problem-number { font-weight: bold; font-size: 1.3em; color: #95a5a6; }
        .problem-expression { font-size: 1.5em; color: #2c3e50; min-width: 250px; }
        .problem-tag { font-size: 0.7em; background: #ecf0f1; color: #7f8c8d; padding: 4px 12px; border-radius: 20px; font-weight: bold; }
        
        .answer-box { display: flex; flex-direction: column; background: #fdfdfd; padding: 15px; border: 1px solid #eee; border-radius: 8px; align-items: center; }
        
        .multi-input-row { display: flex; gap: 15px; justify-content: center; align-items: center; margin: 6px 0; }
        .multi-input-row label { font-size: 1.2em; font-family: 'Times New Roman', Times, serif; font-style: italic; font-weight: bold; }
        .multi-input-row input { width: 60px; padding: 8px; font-size: 1.1em; border: 2px solid #ced4da; border-radius: 6px; text-align: center; font-family: monospace; outline: none; transition: border-color 0.2s; }
        .multi-input-row input:focus { border-color: #3498db; }
        .pt-label { font-weight: bold; color: #7f8c8d; background: #ecf0f1; padding: 2px 8px; border-radius: 4px; font-size: 0.9em; margin-right: 5px; }

        .input-hint { font-size: 0.85em; color: #e67e22; margin-top: 12px; font-weight: bold; }
        
        .solution-area { display: none; margin-top: 20px; padding: 20px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; }
        .algebra-line { display: block; background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 4px; margin: 8px 0; color: #2c3e50; font-size: 0.95em;}
        
        .correct-input { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; }
        .incorrect-input { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .report-header { text-align: center; background: white; border: 3px solid #27ae60; padding: 20px; margin-bottom: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Temporary style to hide elements during generation to avoid screen flashing */
        body.typesetting-mode .solution-area {
            opacity: 0 !important;
        }

        @media print { .controls-container { display: none; } .solution-area { display: block !important; } }
    </style>
</head>
<body>
    <h1>Algebra: Systems of Equations</h1>
    <p class="subtitle">Practice Problems</p>
    
    <div class="controls-container">
        <button id="generateBtn">Generate New Problem Set</button>
        <button id="showSolutionsBtn">Submit & Generate Report</button>
        <div class="problem-count" id="problemCount"></div>
    </div>
    
    <div id="problemContainer" class="problem-list"></div>

    <script>
    (() => {
        const TOTAL_PROBLEMS = 5;
        const container = document.getElementById('problemContainer');
        const generateBtn = document.getElementById('generateBtn');
        const showBtn = document.getElementById('showSolutionsBtn');
        const problemCountEl = document.getElementById('problemCount');
        let currentProblems = [];

        // Secret salt to generate unpredictable hashes. Do not change this unless you update the verifier salt as well.
        const SECRET_SALT = "AlgebraMastery_SecureSalt_98234";

        let savedHistory = JSON.parse(localStorage.getItem('algebraMasteryHistory')) || [];
        let usedExpressions = new Set(savedHistory);

        // Verification token hash generator (Deterministic algorithm)
        function generateWatermark(score, total, timestamp) {
            const raw = `${score}|${total}|${timestamp}|${SECRET_SALT}`;
            let hash1 = 5381;
            let hash2 = 12345;
            for (let i = 0; i < raw.length; i++) {
                const char = raw.charCodeAt(i);
                hash1 = ((hash1 << 5) + hash1) ^ char;
                hash2 = ((hash2 << 7) + hash2) ^ char;
            }
            const p1 = (hash1 >>> 0).toString(16).padStart(8, '0');
            const p2 = (hash2 >>> 0).toString(16).padStart(8, '0');
            const p3 = (hash1 ^ hash2 >>> 0).toString(16).padStart(8, '0');
            return `${p1}-${p2}-${p3}`.toUpperCase();
        }

        function typesetMath(callback) {
            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise([container])
                    .then(() => { if (callback) callback(); })
                    .catch((err) => console.log(err.message));
            } else {
                setTimeout(() => typesetMath(callback), 100);
            }
        }

        function getRnd(min, max, exclude=[]) {
            let val;
            do { val = Math.floor(Math.random() * (max - min + 1)) + min; } while(exclude.includes(val));
            return val;
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function gcd(a, b) {
            return b ? gcd(b, a % b) : a;
        }

        function term(coeff, v, first) {
            if (coeff === 0) return "";
            let absC = Math.abs(coeff);
            let cStr = absC === 1 ? "" : absC;
            if (first) return coeff < 0 ? `-${cStr}${v}` : `${cStr}${v}`;
            return coeff < 0 ? `- ${cStr}${v}` : `+ ${cStr}${v}`;
        }
        
        function constant(c, first=false) {
            if (c === 0) return "";
            if (first) return `${c}`;
            return c < 0 ? `- ${Math.abs(c)}` : `+ ${c}`;
        }

        function fracTerm(num, den, v, first) {
            if (num === 0) return "";
            const g = gcd(Math.abs(num), Math.abs(den));
            let n = Math.abs(num) / g;
            let d = Math.abs(den) / g;
            
            let sign = (num * den < 0) ? "-" : "+";
            if (first) {
                sign = (num * den < 0) ? "-" : "";
            } else {
                sign = (num * den < 0) ? "- " : "+ ";
            }
            
            if (d === 1) {
                if (n === 1) return `${sign}${v}`;
                return `${sign}${n}${v}`;
            }
            
            if (n === 1) {
                return `${sign}\\frac{${v}}{${d}}`;
            }
            return `${sign}\\frac{${n}${v}}{${d}}`;
        }

        function generateProblem(id, type) {
            let prob = { id, type, expression: "", hint: "" };
            let validateFn;
            let stepsArr = [];
            
            const clean = str => (str || '').toLowerCase().replace(/\s+/g, '');
            const buildStepsHTML = (steps) => `<strong>Solution Guide:</strong>` + steps.map(s => `<div class="step-row">${s.m}<span class="algebra-line">\\( ${s.l} \\)</span></div>`).join('');

            switch(type) {
                case 'hard_elim': {
                    let d1 = getRnd(2, 5);
                    let d2 = getRnd(2, 5, [d1]);
                    
                    let kx = getRnd(-2, 2, [0]);
                    let ky = getRnd(-2, 2, [0]);
                    let x = kx * d1;
                    let y = ky * d2;
                    
                    let a1 = getRnd(1, 5);
                    while (gcd(a1, d1) !== 1) a1 = getRnd(1, 5);
                    let b1 = getRnd(-4, 4, [0]);
                    
                    let a2 = getRnd(-4, 4, [0]);
                    let b2 = getRnd(1, 5);
                    while (gcd(b2, d2) !== 1) b2 = getRnd(1, 5);
                    
                    while ((a1 * b2) === (a2 * b1 * d1 * d2)) {
                        a2 = getRnd(-4, 4, [0]);
                    }
                    
                    let c1 = a1 * kx + b1 * y;
                    let c2 = a2 * x + b2 * ky;
                    
                    prob.expression = `\\begin{cases} ${fracTerm(a1, d1, 'x', true)} ${term(b1, 'y', false)} = ${c1} \\\\ ${term(a2, 'x', true)} ${fracTerm(b2, d2, 'y', false)} = ${c2} \\end{cases}`;
                    prob.hint = "Solve for x and y.";
                    
                    validateFn = (inputs) => clean(inputs[0]) === x.toString() && clean(inputs[1]) === y.toString();
                    stepsArr.push({m: "Step 1: Multiply both equations by their denominators to clear fractions.", l: `\\begin{cases} ${term(a1, 'x', true)} ${term(b1 * d1, 'y', false)} = ${c1 * d1} \\\\ ${term(a2 * d2, 'x', true)} ${term(b2, 'y', false)} = ${c2 * d2} \\end{cases}`});
                    stepsArr.push({m: "Step 2: Solve the resulting standard system using elimination.", l: `\\text{Eliminate one variable to solve.}`});
                    stepsArr.push({m: "Step 3: Substitute back.", l: `x = ${x}, \\quad y = ${y}`});
                    break;
                }
                case 'scrambled': {
                    let d1 = getRnd(2, 4);
                    let d2 = getRnd(2, 4, [d1]);
                    
                    let kx = getRnd(-2, 2, [0]);
                    let ky = getRnd(-2, 2, [0]);
                    let x = kx * d1;
                    let y = ky * d2;
                    
                    let a1 = getRnd(1, 4);
                    while (gcd(a1, d1) !== 1) a1 = getRnd(1, 4);
                    let b1 = getRnd(2, 5);
                    let c1 = a1 * kx + b1 * y;
                    
                    let eq1 = c1 === 0 ? `${fracTerm(a1, d1, 'x', true)} = ${term(-b1, 'y', true)}` : `${fracTerm(a1, d1, 'x', true)} = ${c1} ${term(-b1, 'y', false)}`; 
                    
                    let a2 = getRnd(-4, -2);
                    let b2 = getRnd(1, 4);
                    while (gcd(b2, d2) !== 1) b2 = getRnd(1, 4);
                    let c2 = b2 * ky - a2 * x;
                    let eq2 = `${fracTerm(b2, d2, 'y', true)} = ${term(a2, 'x', true)} ${constant(c2, false)}`; 
                    
                    prob.expression = `\\begin{cases} ${eq1} \\\\ ${eq2} \\end{cases}`;
                    prob.hint = "Solve for x and y.";

                    validateFn = (inputs) => clean(inputs[0]) === x.toString() && clean(inputs[1]) === y.toString();
                    stepsArr.push({m: "Step 1: Rearrange both into standard form (Ax + By = C).", l: `\\begin{cases} ${fracTerm(a1, d1, 'x', true)} ${term(b1, 'y', false)} = ${c1} \\\\ ${term(-a2, 'x', true)} ${fracTerm(b2, d2, 'y', false)} = ${c2} \\end{cases}`});
                    stepsArr.push({m: "Step 2: Clear fractions by multiplying each equation by its denominator.", l: `\\begin{cases} ${term(a1, 'x', true)} ${term(b1 * d1, 'y', false)} = ${c1 * d1} \\\\ ${term(-a2 * d2, 'x', true)} ${term(b2, 'y', false)} = ${c2 * d2} \\end{cases}`});
                    stepsArr.push({m: "Step 3: Solve the system.", l: `x = ${x}, \\quad y = ${y}`});
                    break;
                }
                case 'fractional': {
                    let d1 = getRnd(2, 4);
                    let d2 = getRnd(2, 5, [d1]);
                    let x = getRnd(-3, 3, [0]) * d1; 
                    let y = getRnd(-2, 2, [0]) * d2; 
                    let c1 = (x/d1) + (y/d2);
                    let a2 = getRnd(2, 4); 
                    let b2 = getRnd(-4, -1); 
                    let c2 = a2*x + b2*y;
                    
                    prob.expression = `\\begin{cases} \\frac{x}{${d1}} + \\frac{y}{${d2}} = ${c1} \\\\ ${term(a2, 'x', true)} ${term(b2, 'y', false)} = ${c2} \\end{cases}`;
                    prob.hint = "Solve for x and y.";

                    validateFn = (inputs) => clean(inputs[0]) === x.toString() && clean(inputs[1]) === y.toString();
                    stepsArr.push({m: `Step 1: Multiply the top equation by the LCD (${d1 * d2}) to clear fractions.`, l: `${term(d2, 'x', true)} ${term(d1, 'y', false)} = ${c1 * d1 * d2}`});
                    stepsArr.push({m: "Step 2: Solve the new system.", l: `x = ${x}, \\quad y = ${y}`});
                    break;
                }
                case 'three_var': {
                    let d1 = getRnd(2, 4);
                    let d2 = getRnd(2, 3, [d1]);
                    
                    let kx = getRnd(-2, 2, [0]);
                    let ky = getRnd(-2, 2, [0]);
                    let x = kx * d1;
                    let y = ky * d2;
                    let z = getRnd(-3, 3, [0]);
                    
                    let a1 = getRnd(1, 3);
                    while (gcd(a1, d1) !== 1) a1 = getRnd(1, 3);
                    let c1 = a1 * kx + y + z;
                    
                    let a2 = getRnd(2, 4);
                    let b2 = getRnd(-3, -1);
                    while (gcd(Math.abs(b2), d2) !== 1) b2 = getRnd(-3, -1);
                    let c_2 = getRnd(1, 3);
                    let d2_val = a2 * x + b2 * ky + c_2 * z;
                    
                    let a3 = getRnd(-2, 2, [0]);
                    let b3 = getRnd(2, 4);
                    let c_3 = getRnd(-4, -2);
                    let d3 = a3 * x + b3 * y + c_3 * z;
                    
                    prob.expression = `\\begin{cases} ${fracTerm(a1, d1, 'x', true)} + y + z = ${c1} \\\\ ${term(a2, 'x', true)} ${fracTerm(b2, d2, 'y', false)} ${term(c_2, 'z', false)} = ${d2_val} \\\\ ${term(a3, 'x', true)} ${term(b3, 'y', false)} ${term(c_3, 'z', false)} = ${d3} \\end{cases}`;
                    prob.hint = "Solve for all three variables.";

                    validateFn = (inputs) => clean(inputs[0]) === x.toString() && clean(inputs[1]) === y.toString() && clean(inputs[2]) === z.toString();
                    stepsArr.push({m: "Step 1: Multiply equations to clear fractions and rewrite the system with integer coefficients.", l: `\\begin{cases} ${term(a1, 'x', true)} + ${term(d1, 'y', false)} + ${term(d1, 'z', false)} = ${c1 * d1} \\\\ ${term(a2 * d2, 'x', true)} ${term(b2, 'y', false)} ${term(c_2 * d2, 'z', false)} = ${d2_val * d2} \\\\ ${term(a3, 'x', true)} ${term(b3, 'y', false)} ${term(c_3, 'z', false)} = ${d3} \\end{cases}`});
                    stepsArr.push({m: "Step 2: Solve the 3x3 integer system using standard elimination or substitution.", l: `x = ${x}, \\quad y = ${y}, \\quad z = ${z}`});
                    break;
                }
                case 'heavy_fractional': {
                    let d1 = getRnd(2, 3);
                    let d2 = getRnd(2, 3);
                    let g1 = getRnd(2, 3);
                    let g2 = getRnd(2, 3);
                    
                    let kx = getRnd(-1, 1, [0]);
                    let ky = getRnd(-1, 1, [0]);
                    
                    let x = kx * d1 * d2;
                    let y = ky * g1 * g2;
                    
                    let a1 = getRnd(1, 3);
                    while (gcd(a1, d1) !== 1) a1 = getRnd(1, 3);
                    
                    let b1 = getRnd(-3, 3, [0]);
                    while (gcd(Math.abs(b1), g1) !== 1) b1 = getRnd(-3, 3, [0]);
                    
                    let a2 = getRnd(-3, 3, [0]);
                    while (gcd(Math.abs(a2), d2) !== 1) a2 = getRnd(-3, 3, [0]);
                    
                    let b2 = getRnd(1, 3);
                    while (gcd(b2, g2) !== 1) b2 = getRnd(1, 3);
                    
                    while (a1 * b2 * d2 * g1 === a2 * b1 * d1 * g2) {
                        a2 = getRnd(-3, 3, [0]);
                        while (gcd(Math.abs(a2), d2) !== 1) a2 = getRnd(-3, 3, [0]);
                    }
                    
                    let c1 = (a1 / d1) * x + (b1 / g1) * y;
                    let c2 = (a2 / d2) * x + (b2 / g2) * y;
                    
                    prob.expression = `\\begin{cases} ${fracTerm(a1, d1, 'x', true)} ${fracTerm(b1, g1, 'y', false)} = ${c1} \\\\ ${fracTerm(a2, d2, 'x', true)} ${fracTerm(b2, g2, 'y', false)} = ${c2} \\end{cases}`;
                    prob.hint = "Solve for x and y.";
                    
                    validateFn = (inputs) => clean(inputs[0]) === x.toString() && clean(inputs[1]) === y.toString();
                    
                    let lcd1 = (d1 * g1) / gcd(d1, g1);
                    let lcd2 = (d2 * g2) / gcd(d2, g2);
                    
                    stepsArr.push({
                        m: `Step 1: Multiply Eq 1 by its LCD (${lcd1}) and Eq 2 by its LCD (${lcd2}) to clear all fractions.`,
                        l: `\\begin{cases} ${term((a1 * lcd1) / d1, 'x', true)} ${term((b1 * lcd1) / g1, 'y', false)} = ${c1 * lcd1} \\\\ ${term((a2 * lcd2) / d2, 'x', true)} ${term((b2 * lcd2) / g2, 'y', false)} = ${c2 * lcd2} \\end{cases}`
                    });
                    stepsArr.push({m: "Step 2: Solve the resulting system of integer equations.", l: `\\text{Eliminate one variable to find the other.}`});
                    stepsArr.push({m: "Step 3: Substitute back to get the final answers.", l: `x = ${x}, \\quad y = ${y}`});
                    break;
                }
            }
            
            prob.checkAnswers = validateFn;
            prob.revealSteps = () => buildStepsHTML(stepsArr);
            return prob;
        }

        const typeLabels = {
            hard_elim: 'Hard Elimination', scrambled: 'Scrambled Terms', 
            fractional: 'Fractional Coefficients', three_var: '3-Variables (x,y,z)', heavy_fractional: 'Heavy Fractional'
        };

        function render() {
            container.innerHTML = ''; currentProblems = [];
            showBtn.disabled = false; showBtn.style.backgroundColor = '#27ae60'; showBtn.textContent = "Submit & Generate Report";
            
            let types = ['hard_elim', 'scrambled', 'fractional', 'three_var', 'heavy_fractional'];
            types = shuffle(types);
            
            problemCountEl.innerHTML = `<strong>Practice Set:</strong> 5 Algebraic Systems of Equations`;

            for (let i = 1; i <= TOTAL_PROBLEMS; i++) {
                let p;
                let attempts = 0;
                
                do {
                    p = generateProblem(i, types[i - 1]);
                    attempts++;
                } while (usedExpressions.has(p.expression) && attempts < 50);

                if (attempts >= 50) {
                    usedExpressions.clear();
                }

                usedExpressions.add(p.expression);
                currentProblems.push(p);
                
                let inputHTML = '';
                if (p.type === 'three_var') {
                    inputHTML = `
                        <div class="multi-input-row">
                            <label>x = </label><input type="text" class="user-input" id="input-${i}-x" autocomplete="off">
                            <label>&nbsp;&nbsp;y = </label><input type="text" class="user-input" id="input-${i}-y" autocomplete="off">
                            <label>&nbsp;&nbsp;z = </label><input type="text" class="user-input" id="input-${i}-z" autocomplete="off">
                        </div>`;
                } else {
                    inputHTML = `
                        <div class="multi-input-row">
                            <label>x = </label><input type="text" class="user-input" id="input-${i}-x" autocomplete="off">
                            <label>&nbsp;&nbsp;y = </label><input type="text" class="user-input" id="input-${i}-y" autocomplete="off">
                        </div>`;
                }

                const div = document.createElement('div');
                div.className = 'problem-card';
                div.innerHTML = `
                    <div class="problem-header">
                        <span class="problem-number">#${i}</span>
                        <div class="problem-expression">\\( ${p.expression} \\)</div>
                        <span class="problem-tag" style="background-color: #ecf0f1; color: #7f8c8d;">${typeLabels[p.type]}</span>
                    </div>
                    <div class="answer-box">
                        ${inputHTML}
                        <div class="input-hint">${p.hint}</div>
                    </div>
                    <div class="solution-area" id="sol-${i}"></div>`;
                    
                container.appendChild(div);
            }

            localStorage.setItem('algebraMasteryHistory', JSON.stringify(Array.from(usedExpressions)));
            typesetMath();
        }

        function getTimestamp() {
            const now = new Date();
            const yymmdd = String(now.getFullYear()).slice(-2) + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
            const hhmi = String(now.getHours()).padStart(2, '0') + String(now.getMinutes()).padStart(2, '0');
            return `${yymmdd}_${hhmi}`;
        }

        function check() {
            let score = 0;

            // Set temporary class to prevent visible flashing of answers on screen during typesetting
            document.body.classList.add('typesetting-mode');

            currentProblems.forEach(p => {
                let inputElements = [];
                let userValues = [];

                if (p.type === 'three_var') {
                    const ix = document.getElementById(`input-${p.id}-x`);
                    const iy = document.getElementById(`input-${p.id}-y`);
                    const iz = document.getElementById(`input-${p.id}-z`);
                    inputElements.push(ix, iy, iz);
                    userValues.push(ix.value, iy.value, iz.value);
                } else {
                    const ix = document.getElementById(`input-${p.id}-x`);
                    const iy = document.getElementById(`input-${p.id}-y`);
                    inputElements.push(ix, iy);
                    userValues.push(ix.value, iy.value);
                }

                let isCorrect = p.checkAnswers(userValues);

                inputElements.forEach(el => el.classList.add(isCorrect ? 'correct-input' : 'incorrect-input'));
                
                const solDiv = document.getElementById(`sol-${p.id}`);
                solDiv.innerHTML = p.revealSteps();
                solDiv.style.display = 'block';
                
                if (isCorrect) score++;
            });
            
            const timeStr = new Date().toLocaleString();
            const pct = Math.round((score / TOTAL_PROBLEMS) * 100);
            
            showBtn.disabled = true;
            showBtn.innerHTML = `Score: ${score}/${TOTAL_PROBLEMS} (${pct}%)<br><small>${timeStr}</small>`;
            
            typesetMath(() => {
                // Remove typesetting-mode class before cloning so report rendering is unaffected
                document.body.classList.remove('typesetting-mode');

                const clone = document.documentElement.cloneNode(true);
                clone.querySelectorAll('script, .controls-container').forEach(el => el.remove());
                
                const body = clone.querySelector('body');
                
                // Generate a deterministic hash security token for verification [2]
                const watermark = generateWatermark(score, TOTAL_PROBLEMS, timeStr);

                const header = document.createElement('div');
                header.className = 'report-header';
                header.innerHTML = `
                    <h1>Systems of Equations Report</h1>
                    <div style="margin: 12px 0;" id="report-status">
                        <span style="color: #7f8c8d; font-weight: bold; border: 2px solid #ccc; padding: 4px 8px; border-radius: 4px; background: #fafafa;">Verification Pending...</span>
                    </div>
                    <h2>Score: <span id="report-score">${score}</span> / <span id="report-total">${TOTAL_PROBLEMS}</span> (${pct}%)</h2>
                    <p>Date: <span id="report-time">${timeStr}</span></p>
                    <div id="report-token" data-token="${watermark}" style="font-family: monospace; font-size: 0.85em; color: #7f8c8d; margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 10px;">
                        Security Token: ${watermark}
                    </div>
                `;
                body.insertBefore(header, body.firstChild);
                
                const inputs = clone.querySelectorAll('.user-input');
                document.querySelectorAll('.user-input').forEach((original, idx) => {
                    const span = document.createElement('span');
                    span.textContent = original.value || "—";
                    span.className = original.className + " static-answer";
                    span.style.padding = "4px 8px";
                    span.style.border = "2px solid #ccc";
                    span.style.borderRadius = "4px";
                    span.style.backgroundColor = "#fff";
                    span.style.display = "inline-block";
                    span.style.minWidth = "35px";
                    span.style.textAlign = "center";
                    span.style.fontFamily = "monospace";
                    inputs[idx].parentNode.replaceChild(span, inputs[idx]);
                });
                
                // Inject the self-checking validation script into the report HTML [2]
                const verifyScript = document.createElement('script');
                verifyScript.textContent = `
                    (() => {
                        const SECRET_SALT = "AlgebraMastery_SecureSalt_98234";

                        function generateWatermark(score, total, timestamp) {
                            const raw = score + "|" + total + "|" + timestamp + "|" + SECRET_SALT;
                            let hash1 = 5381; let hash2 = 12345;
                            for (let i = 0; i < raw.length; i++) {
                                const char = raw.charCodeAt(i);
                                hash1 = ((hash1 << 5) + hash1) ^ char;
                                hash2 = ((hash2 << 7) + hash2) ^ char;
                            }
                            const p1 = (hash1 >>> 0).toString(16).padStart(8, '0');
                            const p2 = (hash2 >>> 0).toString(16).padStart(8, '0');
                            const p3 = (hash1 ^ hash2 >>> 0).toString(16).padStart(8, '0');
                            return (p1 + "-" + p2 + "-" + p3).toUpperCase();
                        }

                        document.addEventListener('DOMContentLoaded', () => {
                            const scoreEl = document.getElementById('report-score');
                            const totalEl = document.getElementById('report-total');
                            const timeEl = document.getElementById('report-time');
                            const tokenEl = document.getElementById('report-token');
                            const statusEl = document.getElementById('report-status');

                            if (!scoreEl || !totalEl || !timeEl || !tokenEl || !statusEl) return;

                            const score = scoreEl.textContent.trim();
                            const total = totalEl.textContent.trim();
                            const time = timeEl.textContent.trim();
                            const embeddedToken = tokenEl.getAttribute('data-token');

                            const calculatedToken = generateWatermark(score, total, time);

                            if (calculatedToken === embeddedToken) {
                                statusEl.innerHTML = "<span style='color: #27ae60; font-weight: bold; border: 2px solid #27ae60; padding: 5px 10px; border-radius: 4px; background: #e8f8f5;'>&nbsp;&#x2705; Verified Authentic Report</span>";
                            } else {
                                statusEl.innerHTML = "<span style='color: #c0392b; font-weight: bold; border: 2px solid #c0392b; padding: 5px 10px; border-radius: 4px; background: #fadbd8;'>&nbsp;&#x274C; Tampered/Invalid Report</span>";
                                scoreEl.style.textDecoration = "line-through";
                                scoreEl.style.color = "#c0392b";
                                scoreEl.style.fontWeight = "bold";
                            }
                        });
                    })();
                `;
                body.appendChild(verifyScript);

                const blob = new Blob(['<!DOCTYPE html>\n' + clone.outerHTML], { type: 'text/html' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `Systems_Report_${getTimestamp()}.html`;
                a.click();

                // Clear out and hide the solution guides on the user's active screen
                currentProblems.forEach(p => {
                    const solDiv = document.getElementById(`sol-${p.id}`);
                    solDiv.innerHTML = '';
                    solDiv.style.display = 'none';
                });
            });
        }

        generateBtn.addEventListener('click', render);
        showBtn.addEventListener('click', check);
        
        render(); 
    })(); 
    </script>
</body>
</html>
