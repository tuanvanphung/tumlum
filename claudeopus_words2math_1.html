<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Problems: Algebraic Thinking Report</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f0f2f5;
            color: #333;
        }
        h1 { text-align: center; color: #1a2a6c; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        .controls-container {
            text-align: center;
            padding: 20px;
            margin-bottom: 30px;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .controls-row {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        button {
            padding: 12px 28px;
            font-size: 1.05em;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px 10px;
            transition: transform 0.1s, background-color 0.2s;
            vertical-align: middle;
        }
        button:active { transform: scale(0.98); }
        #generateBtn { background-color: #3498db; }
        #showSolutionsBtn { background-color: #27ae60; }
        #showSolutionsBtn:disabled { opacity: 1; cursor: default; }
        .progress-bar-container {
            max-width: 850px;
            margin: 0 auto 20px auto;
            background: #fff;
            border-radius: 12px;
            padding: 15px 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: none;
        }
        .progress-label {
            font-size: 0.95em;
            color: #555;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        .progress-track {
            height: 10px;
            background: #e9ecef;
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3498db, #27ae60);
            border-radius: 5px;
            transition: width 0.4s ease;
            width: 0%;
        }
        .problem-list {
            list-style-type: none;
            padding-left: 0;
            max-width: 850px;
            margin: 0 auto;
        }
        .problem-card {
            margin-bottom: 30px;
            padding: 25px;
            border-radius: 12px;
            background-color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 8px solid #ddd;
        }
        .problem-header {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 8px;
        }
        .problem-number { font-weight: bold; font-size: 1.3em; color: #95a5a6; }
        .category-tag {
            display: inline-block;
            font-size: 0.75em;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 12px;
            background: #eaf2f8;
            color: #2980b9;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        .problem-text {
            font-family: 'Georgia', serif;
            font-size: 1.2em;
            color: #2c3e50;
            line-height: 1.5;
        }
        .answer-box {
            display: flex;
            flex-direction: column;
            background: #fdfdfd;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            gap: 10px;
        }
        .equation-row, .input-row { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
        .equation-input, .user-input {
            padding: 10px;
            font-size: 1.1em;
            border: 2px solid #ced4da;
            border-radius: 6px;
            text-align: center;
        }
        .user-input { width: 180px; }
        .equation-input { width: 320px; font-family: 'Courier New', monospace; }
        .correct-input { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .incorrect-input { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; font-weight: bold; }
        .static-answer { padding: 8px 15px; border-radius: 6px; font-size: 1.1em; border: 1px solid #ccc; display: inline-block; }
        .solution-area {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #f4faff;
            border-radius: 8px;
            border-left: 5px solid #3498db;
        }
        .solution-area h4 {
            margin: 0 0 6px 0;
            color: #2980b9;
            font-size: 1em;
        }
        .hint-explain {
            margin-bottom: 14px;
            padding: 10px 14px;
            background: #fef9e7;
            border-left: 4px solid #f39c12;
            border-radius: 6px;
            font-size: 0.95em;
            color: #7d6608;
        }
        .step-row { margin-bottom: 12px; border-bottom: 1px solid #e1e8ed; padding-bottom: 8px; }
        .final-result {
            color: #2980b9;
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 15px;
        }
        .equation-feedback {
            margin-top: 6px;
            font-size: 0.9em;
            font-weight: 600;
        }
        .eq-correct { color: #28a745; }
        .eq-incorrect { color: #dc3545; }
        .report-header {
            text-align: center;
            background-color: #ffffff;
            border: 3px solid #27ae60;
            padding: 20px;
            margin: 0 auto 30px auto;
            max-width: 850px;
            border-radius: 12px;
            color: #2c3e50;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        @media print {
            .controls-container, .progress-bar-container { display: none !important; }
            .solution-area { display: block !important; }
            body { background: white; }
        }
    </style>
</head>
<body>
    <h1>Translating Words to Math</h1>
    <p class="subtitle">Word Problems & Algebraic Thinking: Scoring and Step-by-Step Solutions.</p>
    <div class="controls-container">
        <div class="controls-row">
            <button id="generateBtn">Generate New Test</button>
            <button id="showSolutionsBtn">Submit & Generate Report</button>
        </div>
    </div>
    <div class="progress-bar-container" id="progressContainer">
        <div class="progress-label">
            <span id="progressText">Answered: 0 / 20</span>
            <span id="progressPct">0%</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div id="problemContainer" class="problem-list"></div>
    <script>
        const container = document.getElementById('problemContainer');
        const generateBtn = document.getElementById('generateBtn');
        const showBtn = document.getElementById('showSolutionsBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const progressPct = document.getElementById('progressPct');
        const TOTAL = 20;
        let currentProblems = [];
        let submitted = false;
        const names = [
            ["Maria","her brother"],["Alex","his sister"],["Priya","her cousin"],
            ["James","his friend"],["Lina","her neighbor"],["Carlos","his uncle"],
            ["Fatima","her aunt"],["David","his brother"],["Yuki","her classmate"],
            ["Omar","his teammate"],["Sofia","her mentor"],["Ethan","his tutor"],
            ["Nia","her pen pal"],["Leo","his coach"],["Ava","her grandmother"]
        ];
        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
        function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
        function shuffle(arr) { for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
        function rd(n, d) { return parseFloat(n.toFixed(d)); }
        /* ═══════════════════════════════════════════
           ORIGINAL 10 GENERATORS
           ═══════════════════════════════════════════ */
        function genConsecutive(id) {
            let start = getRandomInt(50, 150);
            let step = pick([1, 2, 2]);
            let label = step === 2 ? 'consecutive even integers' : 'consecutive odd integers';
            let nums = [start, start + step, start + 2 * step];
            let sum = nums.reduce((a, b) => a + b, 0);
            let eq = `x + (x+${step}) + (x+${2*step}) = ${sum}`;
            return {
                id, category: 'Consecutive Integers',
                text: `The sum of three ${label} is ${sum}. What is the smallest of these integers?`,
                hint: `Let x be the smallest integer. Since they are ${label}, the three numbers are x, x+${step}, and x+${2*step}. Add them together and set equal to ${sum}.`,
                equation: eq,
                acceptableEquations: [eq, `x+(x+${step})+(x+${2*step})=${sum}`, `3x+${3*step}=${sum}`],
                answer: start,
                solutionSteps: `
                    <div class="step-row">Let the integers be x, x+${step}, and x+${2*step}.</div>
                    <div class="step-row">Equation: x + (x+${step}) + (x+${2*step}) = ${sum}</div>
                    <div class="step-row">Combine like terms: 3x + ${3*step} = ${sum}</div>
                    <div class="step-row">Subtract ${3*step}: 3x = ${sum - 3*step}</div>
                    <div class="step-row">Divide by 3: x = ${start}</div>`
            };
        }
        function genGeometry(id) {
            let w = getRandomInt(15, 40);
            let extra = getRandomInt(5, 15);
            let l = w + extra;
            let p = 2 * (l + w);
            let eq = `2(W + ${extra} + W) = ${p}`;
            return {
                id, category: 'Geometry — Perimeter',
                text: `The length of a rectangle is ${extra} cm more than its width. If the perimeter is ${p} cm, find the width.`,
                hint: `Let W = width. The length is W + ${extra}. The perimeter formula is P = 2(L + W). Substitute and solve for W.`,
                equation: eq,
                acceptableEquations: [eq, `2(w+${extra}+w)=${p}`, `2(2w+${extra})=${p}`, `4w+${2*extra}=${p}`],
                answer: w,
                solutionSteps: `
                    <div class="step-row">Let W = width, then L = W + ${extra}</div>
                    <div class="step-row">Perimeter formula: 2(L + W) = ${p}</div>
                    <div class="step-row">Substitute: 2(W + ${extra} + W) = ${p}</div>
                    <div class="step-row">Simplify: 4W + ${2*extra} = ${p}</div>
                    <div class="step-row">Subtract ${2*extra}: 4W = ${p - 2*extra}</div>
                    <div class="step-row">Divide by 4: W = ${w}</div>`
            };
        }
        function genCoins(id) {
            let d = getRandomInt(20, 40);
            let extra = getRandomInt(5, 12);
            let n = d + extra;
            let val = (d * 0.10 + n * 0.05).toFixed(2);
            let eq = `0.10d + 0.05(d + ${extra}) = ${val}`;
            return {
                id, category: 'Coin Problem',
                text: `A collection of nickels and dimes has a total value of $${val}. There are ${extra} more nickels than dimes. How many dimes are there?`,
                hint: `Let d = number of dimes. Nickels = d + ${extra}. Each dime is worth $0.10 and each nickel $0.05. Write a value equation and solve for d.`,
                equation: eq,
                acceptableEquations: [eq, `0.10d+0.05(d+${extra})=${val}`, `0.15d+${(0.05*extra).toFixed(2)}=${val}`, `.10d+.05(d+${extra})=${val}`],
                answer: d,
                solutionSteps: `
                    <div class="step-row">Let d = dimes, nickels = d + ${extra}</div>
                    <div class="step-row">Value equation: 0.10d + 0.05(d + ${extra}) = ${val}</div>
                    <div class="step-row">Distribute: 0.10d + 0.05d + ${(0.05*extra).toFixed(2)} = ${val}</div>
                    <div class="step-row">Combine: 0.15d + ${(0.05*extra).toFixed(2)} = ${val}</div>
                    <div class="step-row">Subtract ${(0.05*extra).toFixed(2)}: 0.15d = ${(val - 0.05*extra).toFixed(2)}</div>
                    <div class="step-row">Divide by 0.15: d = ${d}</div>`
            };
        }
        function genAge(id) {
            let pair = pick(names);
            let younger = getRandomInt(20, 60);
            let diff = getRandomInt(10, 25);
            let sumAge = younger + (younger + diff);
            let eq = `b + (b + ${diff}) = ${sumAge}`;
            return {
                id, category: 'Age Problem',
                text: `${pair[0]} is ${diff} years older than ${pair[1]}. The sum of their ages is ${sumAge}. How old is ${pair[1]}?`,
                hint: `Let b = ${pair[1]}'s age. Then ${pair[0]}'s age is b + ${diff}. Their ages add up to ${sumAge}. Write the equation and solve for b.`,
                equation: eq,
                acceptableEquations: [eq, `b+(b+${diff})=${sumAge}`, `2b+${diff}=${sumAge}`, `x+(x+${diff})=${sumAge}`],
                answer: younger,
                solutionSteps: `
                    <div class="step-row">Let b = ${pair[1]}'s age, then ${pair[0]}'s age = b + ${diff}</div>
                    <div class="step-row">Sum: b + (b + ${diff}) = ${sumAge}</div>
                    <div class="step-row">Combine: 2b + ${diff} = ${sumAge}</div>
                    <div class="step-row">Subtract ${diff}: 2b = ${sumAge - diff}</div>
                    <div class="step-row">Divide by 2: b = ${younger}</div>`
            };
        }
        function genBackwards(id) {
            let x = getRandomInt(25, 80);
            let mult = pick([4, 5]);
            let add = getRandomInt(15, 50);
            let res = x * mult + add;
            let eq = `${mult}x + ${add} = ${res}`;
            return {
                id, category: 'Backwards / Inverse',
                text: `A number is multiplied by ${mult}, then increased by ${add}. The result is ${res}. What was the original number?`,
                hint: `Let x = the original number. Translate the operations into an equation: multiply by ${mult}, then add ${add}, equals ${res}. Work backwards to isolate x.`,
                equation: eq,
                acceptableEquations: [eq, `${mult}x+${add}=${res}`],
                answer: x,
                solutionSteps: `
                    <div class="step-row">Let x = the original number.</div>
                    <div class="step-row">Equation: ${mult}x + ${add} = ${res}</div>
                    <div class="step-row">Subtract ${add}: ${mult}x = ${res - add}</div>
                    <div class="step-row">Divide by ${mult}: x = ${x}</div>`
            };
        }
        function genNumbers(id) {
            let factor = getRandomInt(4, 8);
            let small = getRandomInt(20, 60);
            let big = small * factor;
            let total = small + big;
            let eq = `x + ${factor}x = ${total}`;
            return {
                id, category: 'Number Relationship',
                text: `The sum of two numbers is ${total}. One number is ${factor} times as large as the other. Find the smaller number.`,
                hint: `Let x = the smaller number. The larger number is ${factor}x. Together they equal ${total}. Combine like terms and solve.`,
                equation: eq,
                acceptableEquations: [eq, `x+${factor}x=${total}`, `${factor+1}x=${total}`],
                answer: small,
                solutionSteps: `
                    <div class="step-row">Let x = smaller number, then larger = ${factor}x</div>
                    <div class="step-row">Sum: x + ${factor}x = ${total}</div>
                    <div class="step-row">Combine: ${factor+1}x = ${total}</div>
                    <div class="step-row">Divide by ${factor+1}: x = ${small}</div>`
            };
        }
        function genMixture(id) {
            let pctA = pick([5, 8, 12]);
            let pctB = pick([35, 42, 55]);
            let pctMix = pick([20, 25, 28]);
            let volA = getRandomInt(5, 15) * 10;
            let num = volA * (pctMix - pctA);
            let den = pctB - pctMix;
            if (den <= 0 || num % den !== 0) { pctA=10; pctB=40; pctMix=20; volA=60; num=volA*(pctMix-pctA); den=pctB-pctMix; }
            let volB = num / den;
            let eq = `${pctA/100}(${volA}) + ${pctB/100}(x) = ${pctMix/100}(${volA} + x)`;
            return {
                id, category: 'Mixture Problem',
                text: `A chemist has ${volA} mL of a ${pctA}% acid solution. How many mL of a ${pctB}% acid solution must be added to get a ${pctMix}% acid solution?`,
                hint: `Let x = mL of the ${pctB}% solution to add. The acid from both solutions combined must equal the acid in the final mixture. Use: concentration × volume for each part.`,
                equation: eq,
                acceptableEquations: [eq, `${(pctA/100).toFixed(2)}*${volA}+${(pctB/100).toFixed(2)}*x=${(pctMix/100).toFixed(2)}*(${volA}+x)`],
                answer: volB,
                solutionSteps: `
                    <div class="step-row">Let x = mL of ${pctB}% solution to add.</div>
                    <div class="step-row">Acid from A: ${pctA/100} × ${volA} = ${pctA/100*volA}</div>
                    <div class="step-row">Acid from B: ${pctB/100} × x</div>
                    <div class="step-row">Mixture: ${pctMix/100} × (${volA} + x)</div>
                    <div class="step-row">Equation: ${pctA/100*volA} + ${pctB/100}x = ${pctMix/100}(${volA} + x)</div>
                    <div class="step-row">Expand: ${pctA/100*volA} + ${pctB/100}x = ${pctMix/100*volA} + ${pctMix/100}x</div>
                    <div class="step-row">Collect x: ${rd(pctB/100 - pctMix/100,2)}x = ${pctMix/100*volA - pctA/100*volA}</div>
                    <div class="step-row">Divide: x = ${volB}</div>`
            };
        }
        function genRate(id) {
            let speed1 = getRandomInt(5, 12) * 10;
            let speed2 = speed1 + getRandomInt(2, 6) * 10;
            let sumSpeed = speed1 + speed2;
            let gap = sumSpeed * getRandomInt(4, 8);
            let t = gap / sumSpeed;
            let eq = `${speed1}t + ${speed2}t = ${gap}`;
            return {
                id, category: 'Rate / Distance / Time',
                text: `Two cars start ${gap} miles apart and drive toward each other. One travels at ${speed1} mph and the other at ${speed2} mph. In how many hours will they meet?`,
                hint: `Let t = hours until they meet. Each car covers distance = speed × time. Since they drive toward each other, their combined distances equal ${gap} miles.`,
                equation: eq,
                acceptableEquations: [eq, `${speed1}t+${speed2}t=${gap}`, `${sumSpeed}t=${gap}`],
                answer: t,
                solutionSteps: `
                    <div class="step-row">Let t = hours until they meet.</div>
                    <div class="step-row">Car 1: ${speed1}t miles, Car 2: ${speed2}t miles</div>
                    <div class="step-row">Combined: ${speed1}t + ${speed2}t = ${gap}</div>
                    <div class="step-row">Simplify: ${sumSpeed}t = ${gap}</div>
                    <div class="step-row">Divide by ${sumSpeed}: t = ${t}</div>`
            };
        }
        function genProportion(id) {
            let base = getRandomInt(4, 10);
            let scale = getRandomInt(4, 8);
            let item1qty = base;
            let item2qty = base * getRandomInt(2, 4);
            let needed = item2qty * scale;
            let answer = item1qty * scale;
            let items = pick([
                ['cups of flour','cookies'],['eggs','pancakes'],['gallons of paint','rooms'],['bags of cement','pillars']
            ]);
            let eq = `${item1qty}/${item2qty} = x/${needed}`;
            return {
                id, category: 'Proportion / Ratio',
                text: `A recipe uses ${item1qty} ${items[0]} for every ${item2qty} ${items[1]}. How many ${items[0]} are needed for ${needed} ${items[1]}?`,
                hint: `Set up a proportion comparing ${items[0]} to ${items[1]}. The ratio ${item1qty}/${item2qty} must equal x/${needed}. Cross-multiply to solve.`,
                equation: eq,
                acceptableEquations: [eq, `${item1qty}/${item2qty}=x/${needed}`, `x/${needed}=${item1qty}/${item2qty}`],
                answer: answer,
                solutionSteps: `
                    <div class="step-row">Proportion: ${item1qty} / ${item2qty} = x / ${needed}</div>
                    <div class="step-row">Cross multiply: ${item1qty} × ${needed} = ${item2qty} × x</div>
                    <div class="step-row">${item1qty*needed} = ${item2qty}x</div>
                    <div class="step-row">Divide by ${item2qty}: x = ${answer}</div>`
            };
        }
        function genInequality(id) {
            let budget = getRandomInt(100, 300);
            let perItem = getRandomInt(8, 20);
            let fixed = getRandomInt(15, 50);
            let maxItems = Math.floor((budget - fixed) / perItem);
            let eq = `${perItem}x + ${fixed} ≤ ${budget}`;
            return {
                id, category: 'Inequality',
                text: `You have $${budget} to spend. A store charges a $${fixed} membership fee plus $${perItem} per item. What is the maximum number of whole items you can buy?`,
                hint: `Let x = number of items. Total cost is ${perItem}x + ${fixed}. This must be ≤ $${budget}. Solve the inequality and round down.`,
                equation: eq,
                acceptableEquations: [eq, `${perItem}x+${fixed}<=${budget}`, `${perItem}x+${fixed}≤${budget}`, `${perItem}x+${fixed} <= ${budget}`],
                answer: maxItems,
                solutionSteps: `
                    <div class="step-row">Let x = items purchased.</div>
                    <div class="step-row">Inequality: ${perItem}x + ${fixed} ≤ ${budget}</div>
                    <div class="step-row">Subtract ${fixed}: ${perItem}x ≤ ${budget - fixed}</div>
                    <div class="step-row">Divide by ${perItem}: x ≤ ${rd((budget-fixed)/perItem,2)}</div>
                    <div class="step-row">Round down: x = ${maxItems}</div>`
            };
        }
        /* ═══════════════════════════════════════════
           NEW 10 GENERATORS (11–20)
           ═══════════════════════════════════════════ */
        // 11. Work / Rate
        function genWorkRate(id) {
            let a = pick([3,4,5,6,8]);
            let b = pick([4,5,6,8,10]);
            while(b === a) b = pick([4,5,6,8,10]);
            // 1/a + 1/b = 1/t  →  t = ab/(a+b)
            let num = a * b;
            let den = a + b;
            let gcd = (x,y) => y===0?x:gcd(y,x%y);
            let g = gcd(num, den);
            let ansNum = num / g;
            let ansDen = den / g;
            let answer = rd(num / den, 2);
            let eq = `1/${a} + 1/${b} = 1/t`;
            let workerA = pick(["Alice","Ben","Chen","Dana","Erik"]);
            let workerB = pick(["Fiona","Greg","Hana","Ivan","Jess"]);
            while(workerB === workerA) workerB = pick(["Fiona","Greg","Hana","Ivan","Jess"]);
            let fracStr = ansDen === 1 ? `${ansNum}` : `${ansNum}/${ansDen}`;
            return {
                id, category: 'Work / Rate',
                text: `${workerA} can complete a job in ${a} hours. ${workerB} can complete the same job in ${b} hours. How many hours will it take them working together? (Round to 2 decimal places if needed.)`,
                hint: `${workerA}'s rate is 1/${a} of the job per hour. ${workerB}'s rate is 1/${b}. Combined rate = 1/${a} + 1/${b}. Time = 1 ÷ combined rate.`,
                equation: eq,
                acceptableEquations: [eq, `1/${a}+1/${b}=1/t`],
                answer: answer,
                solutionSteps: `
                    <div class="step-row">${workerA}'s rate: 1/${a} job per hour</div>
                    <div class="step-row">${workerB}'s rate: 1/${b} job per hour</div>
                    <div class="step-row">Combined rate: 1/${a} + 1/${b} = ${b}/${num} + ${a}/${num} = ${den}/${num}</div>
                    <div class="step-row">Time = 1 ÷ (${den}/${num}) = ${num}/${den} = ${fracStr} ≈ ${answer} hours</div>`
            };
        }
        // 12. Systems of Equations
        function genSystems(id) {
            let x = getRandomInt(5, 25);
            let y = getRandomInt(5, 25);
            while(y === x) y = getRandomInt(5, 25);

                }
                eqInput.parentNode.after(eqFeedback);
                eqInput.classList.add(eqMatch ? 'correct-input' : 'incorrect-input');
                sol.style.display = 'block';
                const card = document.getElementById(`card-${p.id}`);
                card.style.borderLeftColor = isCorrect ? '#28a745' : '#dc3545';
            });
            progressFill.style.width = '100%';
            progressText.textContent = `Score: ${score} / ${TOTAL}`;
            progressPct.textContent = `${Math.round(score / TOTAL * 100)}%`;
            const timeStr = new Date().toLocaleString();
            showBtn.disabled = true;
            showBtn.style.backgroundColor = '#7f8c8d';
            showBtn.innerHTML = `Score: ${score}/${TOTAL} | Equations: ${eqScore}/${TOTAL}<br><span style="font-size:0.7em">${timeStr}</span>`;
            const reportHeader = `
                <div class="report-header">
                    <h1>Algebraic Thinking Performance Report</h1>
                    <h2 style="margin:0; color:#27ae60;">Answer Score: ${score} / ${TOTAL}</h2>
                    <h3 style="margin:5px 0 0 0; color:#2980b9;">Equation Setup Score: ${eqScore} / ${TOTAL}</h3>
                    <p>Completed on: ${timeStr}</p>
                </div>`;
            setTimeout(() => downloadReport(reportHeader), 600);
        }
        function downloadReport(headerHtml) {
            const clone = document.documentElement.cloneNode(true);
            clone.querySelectorAll('script, .controls-container, .progress-bar-container').forEach(s => s.remove());
            const body = clone.querySelector('body');
            const headerDiv = document.createElement('div');
            headerDiv.innerHTML = headerHtml;
            body.insertBefore(headerDiv, body.firstChild);
            const origInputs = document.querySelectorAll('.user-input');
            const cloneInputs = clone.querySelectorAll('.user-input');
            cloneInputs.forEach((ci, idx) => {
                const val = origInputs[idx].value || 'None';
                const isCorrect = origInputs[idx].classList.contains('correct-input');
                const span = document.createElement('span');
                span.className = 'static-answer ' + (isCorrect ? 'correct-input' : 'incorrect-input');
                span.textContent = val;
                ci.parentNode.replaceChild(span, ci);
            });
            const origEqs = document.querySelectorAll('.equation-input');
            const cloneEqs = clone.querySelectorAll('.equation-input');
            cloneEqs.forEach((ci, idx) => {
                const val = origEqs[idx].value || 'None';
                const isCorrect = origEqs[idx].classList.contains('correct-input');
                const span = document.createElement('span');
                span.className = 'static-answer ' + (isCorrect ? 'correct-input' : 'incorrect-input');
                span.textContent = val;
                ci.parentNode.replaceChild(span, ci);
            });
            clone.querySelectorAll('.solution-area').forEach(s => s.style.display = 'block');
            const blob = new Blob(['<!DOCTYPE html>\n' + clone.outerHTML], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Algebraic_Thinking_Report_${new Date().getTime()}.html`;
            a.click();
        }
        generateBtn.addEventListener('click', render);
        showBtn.addEventListener('click', check);
        render();
    </script>
</body>
</html>
