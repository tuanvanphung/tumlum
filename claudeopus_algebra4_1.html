<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra Mastery: Comprehensive HS Assessment</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; margin: 0; padding: 20px; background-color: #f0f2f5; color: #333; }
        h1 { text-align: center; color: #1a2a6c; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 0.95em; }
        .controls-container { text-align: center; padding: 20px; margin-bottom: 30px; background-color: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        button { padding: 12px 28px; font-size: 1.05em; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 5px 10px; transition: 0.2s; }
        #generateBtn { background-color: #3498db; }
        #generateBtn:hover { background-color: #2980b9; }
        #showSolutionsBtn { background-color: #27ae60; }
        #showSolutionsBtn:hover { background-color: #219a52; }
        #showSolutionsBtn:disabled { background-color: #7f8c8d; opacity: 1; cursor: default; }
        .problem-count { font-size: 0.95em; color: #555; margin-top: 8px; }
        .problem-list { list-style-type: none; padding-left: 0; max-width: 900px; margin: 0 auto; }
        .tier-divider { max-width: 900px; margin: 30px auto 15px auto; padding: 10px 20px; border-radius: 8px; font-weight: 700; font-size: 1.1em; color: #fff; }
        .tier-divider-1 { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .tier-divider-2 { background: linear-gradient(135deg, #e67e22, #f39c12); }
        .tier-divider-3 { background: linear-gradient(135deg, #c0392b, #e74c3c); }
        .tier-divider span.tier-count { font-weight: 400; font-size: 0.85em; opacity: 0.9; margin-left: 10px; }
        .problem-card { margin-bottom: 30px; padding: 25px; border-radius: 12px; background-color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 8px solid #ddd; }
        .problem-card.card-tier-1 { border-left-color: #27ae60; }
        .problem-card.card-tier-2 { border-left-color: #f39c12; }
        .problem-card.card-tier-3 { border-left-color: #e74c3c; }
        .problem-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .problem-number { font-weight: bold; font-size: 1.3em; color: #95a5a6; min-width: 40px; }
        .problem-expression { font-family: 'Times New Roman', serif; font-size: 1.7em; color: #2c3e50; font-style: italic; flex: 1; }
        .problem-tag { font-size: 0.65em; background: #ecf0f1; color: #7f8c8d; padding: 3px 12px; border-radius: 20px; font-family: 'Segoe UI', sans-serif; font-style: normal; white-space: nowrap; }
        .problem-tier { font-size: 0.6em; padding: 3px 10px; border-radius: 20px; font-family: 'Segoe UI', sans-serif; font-style: normal; white-space: nowrap; color: white; }
        .tier-1 { background-color: #27ae60; }
        .tier-2 { background-color: #f39c12; }
        .tier-3 { background-color: #e74c3c; }
        .answer-box { display: flex; flex-direction: column; background: #fdfdfd; padding: 15px; border: 1px solid #eee; border-radius: 8px; }
        .answer-row { display: flex; align-items: center; margin-bottom: 5px; }
        .user-input { padding: 10px; font-size: 1.2em; border: 2px solid #ced4da; border-radius: 6px; width: 220px; margin-left: 10px; text-align: center; }
        .input-hint { font-size: 0.85em; color: #888; margin-top: 5px; margin-left: 30px; }
        .sqrt { border-top: 2px solid black; padding-top: 2px; margin-left: 2px; }
        .radical { font-size: 1.2em; vertical-align: middle; }
        .cbrt-index { font-size: 0.6em; position: relative; left: 8px; top: -8px; }
        .fraction { display: inline-block; vertical-align: middle; text-align: center; margin: 0 0.2em; font-style: normal; }
        .num { display: block; border-bottom: 1px solid black; padding: 0 5px; }
        .den { display: block; padding: 0 5px; }
        .sys-brace { display: inline-block; font-size: 2.5em; vertical-align: middle; font-weight: 100; margin-right: 8px; }
        .sys-eqs { display: inline-block; vertical-align: middle; }
        .sys-eqs div { font-size: 0.85em; line-height: 1.8; }
        .solution-area { display: none; margin-top: 20px; padding: 20px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; }
        .algebra-line { display: block; font-family: 'Courier New', monospace; background: #fff; padding: 8px; border: 1px solid #ddd; border-radius: 4px; color: #d35400; margin: 5px 0; font-weight: bold; }
        .step-row { margin-bottom: 8px; }
        .correct-input { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; }
        .incorrect-input { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .report-header { text-align: center; background: white; border: 3px solid #27ae60; padding: 20px; margin-bottom: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .legend { max-width: 900px; margin: 0 auto 20px auto; padding: 12px 20px; background: #fff; border-radius: 8px; font-size: 0.85em; color: #666; display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
        @media print { .controls-container, .legend { display: none; } .solution-area { display: block !important; } }
    </style>
</head>
<body>
    <h1>Algebra Mastery: Solving for <i>x</i></h1>
    <p class="subtitle">Comprehensive High School Assessment — 20 Types, 20 Problems, Sorted by Difficulty</p>
    <div class="controls-container">
        <button id="generateBtn">Generate New Problem Set</button>
        <button id="showSolutionsBtn">Submit &amp; Generate Report</button>
        <div class="problem-count" id="problemCount"></div>
    </div>
    <div class="legend">
        <span style="font-weight:600;">Difficulty:</span>
        <span class="legend-item"><span class="legend-dot" style="background:#27ae60;"></span> Algebra 1 Core</span>
        <span class="legend-item"><span class="legend-dot" style="background:#f39c12;"></span> Algebra 1/2 Bridge</span>
        <span class="legend-item"><span class="legend-dot" style="background:#e74c3c;"></span> Algebra 2 Advanced</span>
    </div>
    <div id="problemContainer" class="problem-list"></div>
    <script>
        const container = document.getElementById('problemContainer');
        const generateBtn = document.getElementById('generateBtn');
        const showBtn = document.getElementById('showSolutionsBtn');
        const problemCountEl = document.getElementById('problemCount');
        let currentProblems = [];
        function getRandom(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
        function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
        const allTypes = [
            { key: 'multi_step_linear', label: 'Multi-Step Linear', tier: 1 },
            { key: 'linear_fraction', label: 'Linear w/ Fractions', tier: 1 },
            { key: 'proportion', label: 'Proportion', tier: 1 },
            { key: 'literal_equation', label: 'Literal Equation', tier: 1 },
            { key: 'factoring_trinomial', label: 'Factor Trinomial', tier: 1 },
            { key: 'difference_of_squares', label: 'Difference of Squares', tier: 1 },
            { key: 'completing_square', label: 'Completing the Square', tier: 1 },
            { key: 'quadratic_formula', label: 'Quadratic Formula', tier: 1 },
            { key: 'radical', label: 'Radical Equation', tier: 2 },
            { key: 'absolute', label: 'Absolute Value', tier: 2 },
            { key: 'quadratic_simple', label: 'Simple Quadratic', tier: 2 },
            { key: 'rational_simple', label: 'Rational Equation', tier: 2 },
            { key: 'two_step_sqrt', label: 'Two-Step Radical', tier: 2 },
            { key: 'abs_quad', label: 'Abs + Quadratic', tier: 2 },
            { key: 'exponential', label: 'Exponential', tier: 3 },
            { key: 'logarithmic', label: 'Logarithmic', tier: 3 },
            { key: 'rational_advanced', label: 'Advanced Rational', tier: 3 },
            { key: 'system_of_equations', label: 'System of Equations', tier: 3 },
            { key: 'cube_root', label: 'Cube Root', tier: 3 },
            { key: 'extraneous_check', label: 'Extraneous Solution', tier: 3 },
        ];
        function getTypeInfo(key) {
            return allTypes.find(t => t.key === key) || { label: key, tier: 1 };
        }
        function buildOrderedTypeList() {
            let tier1 = shuffle(allTypes.filter(t => t.tier === 1).map(t => t.key));
            let tier2 = shuffle(allTypes.filter(t => t.tier === 2).map(t => t.key));
            let tier3 = shuffle(allTypes.filter(t => t.tier === 3).map(t => t.key));
            return { tier1, tier2, tier3 };
        }
        function generateProblem(id, type) {
            let prob = { id, type, lhs: "", rhs: "", steps: [], correctAnswers: [], hint: "", answerLabels: ["x"] };
            switch(type) {
                case 'multi_step_linear': {
                    let a = getRandom(2, 6);
                    let b = getRandom(-8, 8);
                    if (b === 0) b = 3;
                    let c = getRandom(1, 5);
                    if (c === a) c = a + 1;
                    let x = getRandom(-10, 10);
                    let d = x * (a - c) + a * b;
                    let bStr = b >= 0 ? `+ ${b}` : `- ${Math.abs(b)}`;
                    prob.lhs = `${a}(x ${bStr})`;
                    prob.rhs = `${c}x ${d >= 0 ? '+ ' + d : '- ' + Math.abs(d)}`;
                    prob.correctAnswers = [x.toString()];
                    prob.steps.push({m: `Distribute ${a}:`, l: `${a}x ${a*b >= 0 ? '+ ' + a*b : '- ' + Math.abs(a*b)} = ${c}x ${d >= 0 ? '+ ' + d : '- ' + Math.abs(d)}`});
                    prob.steps.push({m: `Subtract ${c}x from both sides:`, l: `${a-c}x ${a*b >= 0 ? '+ ' + a*b : '- ' + Math.abs(a*b)} = ${d}`});
                    let rhs2 = d - a*b;
                    prob.steps.push({m: `Subtract ${a*b >= 0 ? a*b : '(' + a*b + ')'}:`, l: `${a-c}x = ${rhs2}`});
                    prob.steps.push({m: `Divide by ${a-c}:`, l: `x = ${x}`});
                    break;
                }
                case 'linear_fraction': {
                    let a = getRandom(2, 8);
                    let b = getRandom(1, 10);
                    let xVal = a * getRandom(1, 6);
                    let c = (xVal / a) + b;
                    prob.lhs = `<div class="fraction"><span class="num">x</span><span class="den">${a}</span></div> + ${b}`;
                    prob.rhs = `${c}`;
                    prob.correctAnswers = [xVal.toString()];
                    prob.steps.push({m: `Subtract ${b} from both sides:`, l: `x/${a} = ${c - b}`});
                    prob.steps.push({m: `Multiply both sides by ${a}:`, l: `x = ${a} × ${c - b} = ${xVal}`});
                    break;
                }
                case 'proportion': {
                    let c = getRandom(2, 6);
                    let xVal = c * getRandom(1, 5);
                    let b = getRandom(2, 8);
                    let a = (xVal * b) / c;
                    prob.lhs = `<div class="fraction"><span class="num">${a}</span><span class="den">x</span></div>`;
                    prob.rhs = `<div class="fraction"><span class="num">${b}</span><span class="den">${c}</span></div>`;
                    prob.correctAnswers = [xVal.toString()];
                    prob.steps.push({m: "Cross-multiply:", l: `${a} × ${c} = ${b} × x`});
                    prob.steps.push({m: "Simplify:", l: `${a * c} = ${b}x`});
                    prob.steps.push({m: `Divide by ${b}:`, l: `x = ${xVal}`});
                    break;
                }
                case 'literal_equation': {
                    let a = getRandom(2, 7);
                    let b = getRandom(2, 6);
                    let c = getRandom(10, 50);
                    prob.lhs = `${a}x + ${b}y`;
                    prob.rhs = `${c}`;
                    prob.hint = "Solve for y in terms of x. Format: (c - ax)/b";
                    prob.answerLabels = ["y"];
                    prob.correctAnswers = [`(${c}-${a}x)/${b}`];
                    prob.literalCheck = true;
                    prob.a_val = a; prob.b_val = b; prob.c_val = c;
                    prob.steps.push({m: `Subtract ${a}x from both sides:`, l: `${b}y = ${c} - ${a}x`});
                    prob.steps.push({m: `Divide by ${b}:`, l: `y = (${c} - ${a}x) / ${b}`});
                    break;
                }
                case 'factoring_trinomial': {
                    let p = getRandom(-9, -1);
                    let q = getRandom(-9, -1);
                    if (p === q) q = p + 1 === 0 ? p - 1 : p + 1;
                    let bCoeff = p + q;
                    let cCoeff = p * q;
                    let bStr = bCoeff >= 0 ? `+ ${bCoeff}` : `- ${Math.abs(bCoeff)}`;
                    let cStr = cCoeff >= 0 ? `+ ${cCoeff}` : `- ${Math.abs(cCoeff)}`;
                    prob.lhs = `x<sup>2</sup> ${bStr}x ${cStr}`;
                    prob.rhs = `0`;
                    prob.correctAnswers = [(-p).toString(), (-q).toString()];
                    prob.hint = "Enter two solutions separated by a comma.";
                    prob.steps.push({m: `Find two numbers that multiply to ${cCoeff} and add to ${bCoeff}:`, l: `${p} and ${q}`});
                    prob.steps.push({m: "Factor:", l: `(x ${p >= 0 ? '+ ' + p : '- ' + Math.abs(p)})(x ${q >= 0 ? '+ ' + q : '- ' + Math.abs(q)}) = 0`});
                    prob.steps.push({m: "Set each factor to zero:", l: `x = ${-p},  x = ${-q}`});
                    break;
                }
                case 'difference_of_squares': {
                    let a = getRandom(2, 12);
                    prob.lhs = `x<sup>2</sup> - ${a * a}`;
                    prob.rhs = `0`;
                    prob.correctAnswers = [a.toString(), (-a).toString()];
                    prob.hint = "Enter two solutions separated by a comma.";
                    prob.steps.push({m: "Recognize difference of squares:", l: `x² - ${a}² = 0`});
                    prob.steps.push({m: "Factor:", l: `(x + ${a})(x - ${a}) = 0`});
                    prob.steps.push({m: "Solutions:", l: `x = ${a},  x = -${a}`});
                    break;
                }
                case 'completing_square': {
                    let a = getRandom(1, 8);
                    let sqrtVal = getRandom(2, 7);
                    let b = sqrtVal * sqrtVal;
                    let sign = getRandom(0, 1) ? 1 : -1;
                    a = a * sign;
                    let ans1 = -a + sqrtVal;
                    let ans2 = -a - sqrtVal;
                    let aStr = a >= 0 ? `+ ${a}` : `- ${Math.abs(a)}`;
                    prob.lhs = `(x ${aStr})<sup>2</sup>`;
                    prob.rhs = `${b}`;
                    prob.correctAnswers = [ans1.toString(), ans2.toString()];
                    prob.hint = "Enter two solutions separated by a comma.";
                    prob.steps.push({m: "Take square root of both sides:", l: `x ${aStr} = ±${sqrtVal}`});
                    prob.steps.push({m: `Subtract ${a >= 0 ? a : '(' + a + ')'}:`, l: `x = ${-a} ± ${sqrtVal}`});
                    prob.steps.push({m: "Solutions:", l: `x = ${ans1},  x = ${ans2}`});
                    break;
                }
                case 'quadratic_formula': {
                    let r1 = getRandom(-8, 8);
                    let r2 = getRandom(-8, 8);
                    if (r1 === r2) r2 = r1 + getRandom(1, 3);
                    let bQ = -(r1 + r2);
                    let cQ = r1 * r2;
                    let bStr = bQ >= 0 ? `+ ${bQ}` : `- ${Math.abs(bQ)}`;
                    let cStr = cQ >= 0 ? `+ ${cQ}` : `- ${Math.abs(cQ)}`;
                    prob.lhs = `x<sup>2</sup> ${bStr}x ${cStr}`;
                    prob.rhs = `0`;
                    prob.correctAnswers = [r1.toString(), r2.toString()];
                    prob.hint = "Use the quadratic formula. Enter two solutions separated by a comma.";
                    let disc = bQ * bQ - 4 * cQ;
                    prob.steps.push({m: `Identify a=1, b=${bQ}, c=${cQ}:`, l: `x = (-b ± √(b²-4ac)) / 2a`});
                    prob.steps.push({m: "Discriminant:", l: `b²-4ac = ${bQ*bQ} - ${4*cQ} = ${disc}`});
                    prob.steps.push({m: "Apply formula:", l: `x = (${-bQ} ± ${Math.sqrt(disc)}) / 2`});
                    prob.steps.push({m: "Solutions:", l: `x = ${r1},  x = ${r2}`});
                    break;
                }
                case 'radical': {
                    let a = getRandom(2, 30);
                    let b = getRandom(2, 12);
                    let ans = (b * b) + a;
                    prob.lhs = `<span class="radical">&radic;</span><span class="sqrt">x - ${a}</span>`;
                    prob.rhs = `${b}`;
                    prob.correctAnswers = [ans.toString()];
                    prob.steps.push({m: "Square both sides:", l: `x - ${a} = ${b}² = ${b*b}`});
                    prob.steps.push({m: `Add ${a}:`, l: `x = ${b*b} + ${a} = ${ans}`});
                    break;
                }
                case 'absolute': {
                    let a = getRandom(3, 30);
                    let b = getRandom(3, 20);
                    let ans1 = b - a;
                    let ans2 = -b - a;
                    prob.lhs = `| x + ${a} |`;
                    prob.rhs = `${b}`;
                    prob.correctAnswers = [ans1.toString(), ans2.toString()];
                    prob.hint = "Enter two solutions separated by a comma.";
                    prob.steps.push({m: "Split into two equations:", l: `x + ${a} = ${b}  OR  x + ${a} = -${b}`});
                    prob.steps.push({m: `Subtract ${a}:`, l: `x = ${ans1},  x = ${ans2}`});
                    break;
                }
                case 'quadratic_simple': {
                    let a = getRandom(2, 7);
                    let x = getRandom(2, 9);
                    let b = a * (x * x);
                    prob.lhs = `${a}x<sup>2</sup>`;
                    prob.rhs = `${b}`;
                    prob.correctAnswers = [x.toString(), (-x).toString()];
                    prob.hint = "Enter two solutions (positive and negative).";
                    prob.steps.push({m: `Divide by ${a}:`, l: `x² = ${b / a}`});
                    prob.steps.push({m: "Take ± square root:", l: `x = ±√${b / a} = ±${x}`});
                    break;
                }
                case 'rational_simple': {
                    let x = getRandom(2, 12);
                    let b = getRandom(2, 9);
                    let a = x * b;
                    prob.lhs = `<div class="fraction"><span class="num">${a}</span><span class="den">x</span></div>`;
                    prob.rhs = `${b}`;
                    prob.correctAnswers = [x.toString()];
                    prob.steps.push({m: "Multiply both sides by x:", l: `${a} = ${b}x`});
                    prob.steps.push({m: `Divide by ${b}:`, l: `x = ${x}`});
                    break;
                }
                case 'two_step_sqrt': {
                    let a = getRandom(1, 15);
                    let rootVal = getRandom(2, 8);
                    let b = a + rootVal;
                    let ans = rootVal * rootVal;
                    prob.lhs = `<span class="radical">&radic;</span><span class="sqrt">x</span> + ${a}`;
                    prob.rhs = `${b}`;
                    prob.correctAnswers = [ans.toString()];
                    prob.steps.push({m: `Subtract ${a}:`, l: `√x = ${rootVal}`});
                    prob.steps.push({m: "Square both sides:", l: `x = ${rootVal}² = ${ans}`});
                    break;
                }
                case 'abs_quad': {
                    let xVal = getRandom(3, 9);
                    let perfectSq = xVal * xVal;
                    let cVal = getRandom(1, Math.floor(perfectSq / 2) - 1);
                    let dVal = perfectSq - cVal;
                    prob.lhs = `| x<sup>2</sup> - ${cVal} |`;
                    prob.rhs = `${dVal}`;
                    prob.correctAnswers = [xVal.toString(), (-xVal).toString()];
                    prob.hint = "One case may have no real solution. Enter valid solutions separated by a comma.";
                    prob.steps.push({m: "Split into two cases:", l: `x² - ${cVal} = ${dVal}  OR  x² - ${cVal} = -${dVal}`});
                    prob.steps.push({m: "Case 1:", l: `x² = ${cVal + dVal} → x = ±${xVal}`});
                    prob.steps.push({m: "Case 2:", l: `x² = ${cVal - dVal} → No real solution`});
                    break;
                }
                case 'exponential': {
                    let base = [2, 3, 5][getRandom(0, 2)];
                    let n = getRandom(2, 6);
                    let result = Math.pow(base, n);
                    prob.lhs = `${base}<sup>x</sup>`;
                    prob.rhs = `${result}`;
                    prob.correctAnswers = [n.toString()];
                    prob.steps.push({m: `Express ${result} as a power of ${base}:`, l: `${result} = ${base}^${n}`});
                    prob.steps.push({m: "Bases equal → exponents equal:", l: `x = ${n}`});
                    break;
                }
                case 'logarithmic': {
                    let base = [2, 3, 5, 10][getRandom(0, 3)];
                    let b = getRandom(2, 4);
                    let ans = Math.pow(base, b);
                    prob.lhs = `log<sub>${base}</sub>(x)`;
                    prob.rhs = `${b}`;
                    prob.correctAnswers = [ans.toString()];
                    prob.steps.push({m: "Convert to exponential form:", l: `${base}^${b} = x`});
                    prob.steps.push({m: "Calculate:", l: `x = ${ans}`});
                    break;
                }
                case 'rational_advanced': {
                    let xVal = getRandom(1, 10);
                    let b = getRandom(1, 8);
                    let c = getRandom(2, 6);
                    let a = c * (xVal + b);
                    prob.lhs = `<div class="fraction"><span class="num">${a}</span><span class="den">x + ${b}</span></div>`;
                    prob.rhs = `${c}`;
                    prob.correctAnswers = [xVal.toString()];
                    prob.steps.push({m: `Multiply both sides by (x + ${b}):`, l: `${a} = ${c}(x + ${b})`});
                    prob.steps.push({m: "Distribute:", l: `${a} = ${c}x + ${c * b}`});
                    prob.steps.push({m: `Subtract ${c * b}:`, l: `${a - c * b} = ${c}x`});
                    prob.steps.push({m: `Divide by ${c}:`, l: `x = ${xVal}`});
                    break;
                }
                case 'system_of_equations': {
                    let xVal = getRandom(-5, 5);
                    let yVal = getRandom(-5, 5);
                    if (xVal === 0) xVal = 1;
                    if (yVal === 0) yVal = 1;
                    let a = getRandom(1, 4), b = getRandom(1, 4);
                    let c = getRandom(1, 4), d = getRandom(1, 4);
                    while (a * d - b * c === 0) { d = getRandom(1, 5); }
                    let e = a * xVal + b * yVal;
                    let f = c * xVal + d * yVal;
                    prob.lhs = `<span class="sys-brace">{</span><span class="sys-eqs"><div>${a}x + ${b}y = ${e}</div><div>${c}x + ${d}y = ${f}</div></span>`;
                    prob.rhs = ``;
                    prob.correctAnswers = [xVal.toString(), yVal.toString()];
                    prob.hint = "Enter x, y separated by a comma (e.g., 3, -2).";
                    prob.answerLabels = ["x", "y"];
                    prob.systemCheck = true;
                    prob.steps.push({m: `Multiply eq1 by ${c} and eq2 by ${a}:`, l: `${a*c}x + ${b*c}y = ${e*c}  and  ${a*c}x + ${a*d}y = ${a*f}`});
                    prob.steps.push({m: "Subtract to eliminate x:", l: `${b*c - a*d}y = ${e*c - a*f}`});
                    prob.steps.push({m: "Solve for y:", l: `y = ${yVal}`});
                    prob.steps.push({m: "Substitute back:", l: `${a}x + ${b}(${yVal}) = ${e} → ${a}x = ${e - b * yVal} → x = ${xVal}`});
                    break;
                }
                case 'cube_root': {
                    let b = getRandom(2, 5);
                    let a = getRandom(1, 20);
                    let ans = (b * b * b) - a;
                    prob.lhs = `<span class="cbrt-index">3</span><span class="radical">&radic;</span><span class="sqrt">x + ${a}</span>`;
                    prob.rhs = `${b}`;
                    prob.correctAnswers = [ans.toString()];
                    prob.steps.push({m: "Cube both sides:", l: `x + ${a} = ${b}³ = ${b*b*b}`});
                    prob.steps.push({m: `Subtract ${a}:`, l: `x = ${b*b*b} - ${a} = ${ans}`});
                    break;
                }
                case 'extraneous_check': {
                    let xGood = getRandom(5, 10);
                    let bVal = getRandom(1, 3);
                    let sqrtResult = xGood - bVal;
                    let aVal = sqrtResult * sqrtResult - xGood;
                    let B = -(2 * bVal + 1), C = bVal * bVal - aVal;
                    let disc = B * B - 4 * C;
                    let xBad = (-B - Math.sqrt(disc)) / 2;
                    if (xBad === xGood) xBad = (-B + Math.sqrt(disc)) / 2;
                    let aStr = aVal >= 0 ? `+ ${aVal}` : `- ${Math.abs(aVal)}`;
                    prob.lhs = `<span class="radical">&radic;</span><span class="sqrt">x ${aStr}</span>`;
                    prob.rhs = `x - ${bVal}`;
                    prob.correctAnswers = [xGood.toString()];
                    prob.hint = "Check for extraneous solutions! One root may not work.";
                    prob.steps.push({m: "Square both sides:", l: `x ${aStr} = (x - ${bVal})² = x² - ${2*bVal}x + ${bVal*bVal}`});
                    prob.steps.push({m: "Rearrange:", l: `x² - ${2*bVal+1}x + ${bVal*bVal - aVal} = 0`});
                    prob.steps.push({m: "Solve:", l: `x = ${xGood} or x = ${xBad}`});
                    prob.steps.push({m: `Check x = ${xBad}: RHS = ${xBad - bVal} (negative!) ❌`, l: `x = ${xBad} is EXTRANEOUS`});
                    prob.steps.push({m: `Check x = ${xGood}: ${sqrtResult} = ${sqrtResult} ✓`, l: `x = ${xGood} is VALID`});
                    break;
                }
            }
            return prob;
        }
        function getTimestamp() {
            const now = new Date();
            const yy = String(now.getFullYear()).slice(-2);
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const hh = String(now.getHours()).padStart(2, '0');
            const mi = String(now.getMinutes()).padStart(2, '0');
            return `${yy}${mm}${dd}_${hh}${mi}`;
        }
        function render() {
            container.innerHTML = ''; currentProblems = [];
            showBtn.disabled = false; showBtn.style.backgroundColor = '#27ae60'; showBtn.textContent = "Submit & Generate Report";
            const typeSets = buildOrderedTypeList();
            const TOTAL = allTypes.length;
            problemCountEl.textContent = `${TOTAL} problems — 1 of each type, easy → hard.`;
            const tierNames = {
                1: { label: '🟢 Section A — Algebra 1 Core', cls: 'tier-divider-1' },
                2: { label: '🟡 Section B — Algebra 1/2 Bridge', cls: 'tier-divider-2' },
                3: { label: '🔴 Section C — Algebra 2 Advanced', cls: 'tier-divider-3' },
            };
            let globalIndex = 1;
            [
                { tier: 1, items: typeSets.tier1 },
                { tier: 2, items: typeSets.tier2 },
                { tier: 3, items: typeSets.tier3 },
            ].forEach(section => {
                const divider = document.createElement('div');
                divider.className = `tier-divider ${tierNames[section.tier].cls}`;
                divider.innerHTML = `${tierNames[section.tier].label}<span class="tier-count">(${section.items.length} problems)</span>`;
                container.appendChild(divider);
                section.items.forEach(typeKey => {
                    const p = generateProblem(globalIndex, typeKey);
                    currentProblems.push(p);
                    const info = getTypeInfo(typeKey);
                    const tierClass = `tier-${info.tier}`;
                    const tierLabel = info.tier === 1 ? 'Alg 1' : info.tier === 2 ? 'Alg 1/2' : 'Alg 2';
                    const div = document.createElement('div');
                    div.className = `problem-card card-tier-${info.tier}`;
                    let answerInputs = '';
                    if (p.systemCheck) {
                        answerInputs = `
                            <div class="answer-row"><label>x = </label><input type="text" class="user-input" id="input-${globalIndex}-x" placeholder="?"></div>
                            <div class="answer-row" style="margin-top:8px;"><label>y = </label><input type="text" class="user-input" id="input-${globalIndex}-y" placeholder="?"></div>`;
                    } else {
                        const lbl = p.answerLabels[0] || 'x';
                        answerInputs = `<div class="answer-row"><label>${lbl} = </label><input type="text" class="user-input" id="input-${globalIndex}" placeholder="?"></div>`;
                    }
                    div.innerHTML = `
                        <div class="problem-header">
                            <span class="problem-number">#${globalIndex}</span>
                            <div class="problem-expression">${p.lhs} ${p.rhs !== '' ? '= ' + p.rhs : ''}</div>
                            <span class="problem-tag">${info.label}</span>
                            <span class="problem-tier ${tierClass}">${tierLabel}</span>
                        </div>
                        <div class="answer-box">
                            ${answerInputs}
                            <div class="input-hint">${p.hint || "Enter the numeric answer."}</div>
                        </div>
                        <div class="solution-area" id="sol-${globalIndex}">
                            <strong>Step-by-Step Solution:</strong>
                            ${p.steps.map(s => `<div class="step-row">${s.m}<span class="algebra-line">${s.l}</span></div>`).join('')}
                            <div style="color:#2980b9; font-weight:bold; margin-top:10px;">Final Answer(s): ${p.correctAnswers.join(', ')}</div>
                        </div>`;
                    container.appendChild(div);
                    globalIndex++;
                });
            });
        }
        function checkAnswer(prob) {
            if (prob.systemCheck) {
                const inputX = document.getElementById(`input-${prob.id}-x`);
                const inputY = document.getElementById(`input-${prob.id}-y`);
                const ux = inputX.value.replace(/\s+/g, '');
                const uy = inputY.value.replace(/\s+/g, '');
                const isCorrect = ux === prob.correctAnswers[0] && uy === prob.correctAnswers[1];
                inputX.classList.add(isCorrect ? 'correct-input' : 'incorrect-input');
                inputY.classList.add(isCorrect ? 'correct-input' : 'incorrect-input');
                return isCorrect;
            }
            if (prob.literalCheck) {
                const input = document.getElementById(`input-${prob.id}`);
                let userVal = input.value.replace(/\s+/g, '').toLowerCase();
                const a = prob.a_val, b = prob.b_val, c = prob.c_val;
                const accepted = [
                    `(${c}-${a}x)/${b}`,
                    `(${c}-${a}*x)/${b}`,
                    `${c}/${b}-${a}x/${b}`,
                    `${c}/${b}-${a}/${b}x`,
                ];
                let isCorrect = accepted.some(ans => userVal === ans.replace(/\s+/g, '').toLowerCase());
                input.classList.add(isCorrect ? 'correct-input' : 'incorrect-input');
                return isCorrect;
            }
            const input = document.getElementById(`input-${prob.id}`);
            const userVal = input.value.replace(/\s+/g, '');
            let userArr = userVal.split(',').map(s => s.trim()).filter(s => s !== "");
            let isCorrect = (userArr.length === prob.correctAnswers.length) &&
                             userArr.every(val => prob.correctAnswers.includes(val));
            input.classList.add(isCorrect ? 'correct-input' : 'incorrect-input');
            return isCorrect;
        }
        function check() {
            let score = 0;
            const TOTAL = currentProblems.length;
            let tierScores = { 1: { correct: 0, total: 0 }, 2: { correct: 0, total: 0 }, 3: { correct: 0, total: 0 } };
            currentProblems.forEach(p => {
                const info = getTypeInfo(p.type);
                tierScores[info.tier].total++;
                const correct = checkAnswer(p);
                if (correct) { score++; tierScores[info.tier].correct++; }
                document.getElementById(`sol-${p.id}`).style.display = 'block';
            });
            const timeStr = new Date().toLocaleString();
            const pct = Math.round((score / TOTAL) * 100);
            showBtn.disabled = true;
            showBtn.innerHTML = `Score: ${score}/${TOTAL} (${pct}%)<br><small>Alg1: ${tierScores[1].correct}/${tierScores[1].total} | Bridge: ${tierScores[2].correct}/${tierScores[2].total} | Alg2: ${tierScores[3].correct}/${tierScores[3].total}</small><br><small>${timeStr}</small>`;
            const clone = document.documentElement.cloneNode(true);
            clone.querySelectorAll('script, .controls-container, .legend').forEach(el => el.remove());
            const body = clone.querySelector('body');
            const header = document.createElement('div');
            header.className = 'report-header';
            header.innerHTML = `
                <h1>Algebra Mastery Report</h1>
                <h2>Overall Score: ${score} / ${TOTAL} (${pct}%)</h2>
                <p><strong style="color:#27ae60;">Algebra 1 Core:</strong> ${tierScores[1].correct}/${tierScores[1].total} &nbsp;|&nbsp;
                   <strong style="color:#f39c12;">Bridge:</strong> ${tierScores[2].correct}/${tierScores[2].total} &nbsp;|&nbsp;
                   <strong style="color:#e74c3c;">Algebra 2:</strong> ${tierScores[3].correct}/${tierScores[3].total}</p>
                <p>Date: ${timeStr}</p>`;
            body.insertBefore(header, body.firstChild);
            const inputs = clone.querySelectorAll('.user-input');
            document.querySelectorAll('.user-input').forEach((original, idx) => {
                const span = document.createElement('span');
                span.textContent = original.value || "Empty";
                span.className = original.className + " static-answer";
                span.style.padding = "5px 15px";
                span.style.border = "1px solid #ccc";
                span.style.display = "inline-block";
                span.style.minWidth = "80px";
                span.style.textAlign = "center";
                span.style.borderRadius = "6px";
                span.style.fontSize = "1.2em";
                if (original.classList.contains('correct-input')) {
                    span.style.backgroundColor = '#d4edda';
                    span.style.borderColor = '#28a745';
                    span.style.color = '#155724';
                } else if (original.classList.contains('incorrect-input')) {
                    span.style.backgroundColor = '#f8d7da';
                    span.style.borderColor = '#dc3545';
                    span.style.color = '#721c24';
                }
                inputs[idx].parentNode.replaceChild(span, inputs[idx]);
            });
            clone.querySelectorAll('.solution-area').forEach(s => s.style.display = 'block');
            const blob = new Blob(['<!DOCTYPE html>\n' + clone.outerHTML], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Algebra_Mastery_Report_${getTimestamp()}.html`;
            a.click();
        }
        generateBtn.addEventListener('click', render);
        showBtn.addEventListener('click', check);
        render();
    </script>
</body>
</html>
